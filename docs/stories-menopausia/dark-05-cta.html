<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>WellCore · Mujer Menopausia 05 · CTA · DARK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --wc-bg:#0A0A0B;--wc-bg2:#131316;--wc-bg3:#1A1A1E;
  --wc-accent:#EF4444;--wc-accent-2:#DC2626;
  --wc-text:#FFFFFF;--wc-text-2:#EAEAEC;--wc-text-3:#A1A1A6;--wc-text-4:#6E6E73;
  --fd:'Oswald','Impact',sans-serif;--fs:'Raleway',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'JetBrains Mono',monospace;--r-xl:28px;--r-md:16px;--r-pill:999px;
  --sh-card:0 0 0 0.5px rgba(255,255,255,.06),0 2px 8px rgba(0,0,0,.40),0 8px 24px rgba(0,0,0,.45),0 20px 48px rgba(0,0,0,.30);
}
html,body{width:1080px;height:1920px;overflow:hidden}
body{
  font-family:var(--fs);
  background:radial-gradient(ellipse 900px 700px at 0% 0%,rgba(239,68,68,.10) 0%,transparent 55%),radial-gradient(ellipse 700px 900px at 90% 30%,rgba(239,68,68,.06) 0%,transparent 60%),radial-gradient(ellipse 1100px 800px at 50% 100%,rgba(127,29,29,.20) 0%,transparent 60%),#0A0A0B;
  position:relative;
}
.watermark{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-35deg);
  font-family:var(--fd);font-size:320px;font-weight:700;letter-spacing:-8px;
  color:rgba(255,255,255,.025);pointer-events:none;user-select:none;white-space:nowrap;z-index:0;
}
.content{
  position:relative;z-index:1;
  width:1080px;height:1920px;
  padding:160px 88px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.eyebrow{
  font-family:var(--fm);font-size:22px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:var(--wc-text-4);
}
.mega-headline{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  gap:8px;
}
.mega-line-1{
  font-family:var(--fd);font-size:120px;font-weight:300;line-height:.88;
  color:var(--wc-text-2);text-transform:uppercase;letter-spacing:-.01em;
  text-shadow:0 0 24px rgba(239,68,68,.20),0 4px 24px rgba(0,0,0,.10);
}
.mega-line-2{
  font-family:var(--fd);font-size:158px;font-weight:700;line-height:.85;
  color:var(--wc-accent);text-transform:uppercase;letter-spacing:-.02em;
  text-shadow:0 0 60px rgba(239,68,68,.50),0 4px 32px rgba(239,68,68,.25);
}
.mega-line-3{
  font-family:var(--fd);font-size:118px;font-weight:300;font-style:italic;line-height:.88;
  color:var(--wc-text-2);text-transform:uppercase;letter-spacing:-.01em;
  text-shadow:0 0 24px rgba(239,68,68,.20),0 4px 24px rgba(0,0,0,.10);
}
.divider{
  width:80px;height:3px;background:var(--wc-accent);
  margin:32px 0;border-radius:2px;
  box-shadow:0 0 16px rgba(239,68,68,.60);
}
.sub-copy{
  font-family:var(--fs);font-size:46px;font-weight:400;line-height:1.45;
  color:var(--wc-text-3);
}
.sub-copy em{font-style:italic;color:var(--wc-text-2);}
.sub-copy strong{font-weight:700;color:var(--wc-text);}
.bottom-section{
  display:flex;flex-direction:column;gap:36px;
}
.cta-pill{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--wc-accent);color:#FFFFFF;
  font-family:var(--fd);font-size:38px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;
  padding:32px 64px;border-radius:var(--r-pill);
  box-shadow:0 4px 24px rgba(239,68,68,.50),0 12px 40px rgba(239,68,68,.30),0 0 80px rgba(239,68,68,.20);
  align-self:flex-start;
}
.logo-bar{display:flex;align-items:center;gap:20px;}
.logo-wordmark{font-family:var(--fd);font-size:36px;font-weight:700;letter-spacing:.12em;color:var(--wc-text-3);text-transform:uppercase;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--wc-accent);box-shadow:0 0 12px rgba(239,68,68,.80);}
</style>
</head>
<body>
<div class="watermark">MENOP</div>
<div class="content">
  <div class="eyebrow">— El Método · Menopausia —</div>
  <div class="mega-headline">
    <div class="mega-line-1">Menos</div>
    <div class="mega-line-2">ESTRÓGENO.</div>
    <div class="mega-line-3">más fuerza.</div>
    <div class="divider"></div>
    <div class="sub-copy">
      Tu coach diseña el plan<br>
      para esta etapa — <em>con la ciencia</em><br>
      que <strong>respalda cada decisión.</strong>
    </div>
  </div>
  <div class="bottom-section">
    <div class="cta-pill">Empieza hoy</div>
    <div class="logo-bar">
      <div class="logo-dot"></div>
      <div class="logo-wordmark">WellCore</div>
    </div>
  </div>
</div>
</body>
</html>
