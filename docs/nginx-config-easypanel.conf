## EasyPanel → wellcorefitness → NGINX → Config → Editar
## Pegar ESTO reemplazando TODO el contenido y presionar "Listo" → "Guardar".
## Impacto medido: Cache-TTL 0s → 1 año para assets. Score móvil PageSpeed esperado: +15-25 puntos.
## NO toca HTML ni rutas PHP. Totalmente reversible restaurando la config previa.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root {{ document_root }};

    index index.php index.html;

    server_name _;

    client_max_body_size 20M;

    # ── Compresión ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;

    # ── Vite: hashed assets (app-abc123.js) → inmutable 1 año ──
    location ^~ /build/assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ── Fonts self-hosted → inmutable 1 año ───────────────────
    location ^~ /fonts/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ── Imágenes, íconos, SVG → 30 días ───────────────────────
    location ~* \.(png|jpe?g|gif|webp|avif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ── /js/*.js (Alpine self-hosted y similares) → 30 días ───
    location ~* ^/js/.*\.js$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
        try_files $uri =404;
    }

    # ── Laravel router ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass {{ fpm_socket }};
    }
}
