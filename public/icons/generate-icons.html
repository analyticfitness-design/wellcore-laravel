<!-- Open this file in a browser to generate PWA icons. Right-click canvas > Save as PNG -->
<!DOCTYPE html>
<html>
<body style="background:#111;padding:40px;">
<h2 style="color:white">192x192</h2>
<canvas id="c192" width="192" height="192"></canvas>
<h2 style="color:white">512x512</h2>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(id, size) {
    const c = document.getElementById(id);
    const ctx = c.getContext('2d');
    // Background
    ctx.fillStyle = '#DC2626';
    ctx.beginPath();
    const r = size * 0.15;
    ctx.roundRect(0, 0, size, size, r);
    ctx.fill();
    // Letter W
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `bold ${size * 0.55}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('W', size/2, size/2 + size*0.02);
}
drawIcon('c192', 192);
drawIcon('c512', 512);
</script>
</body>
</html>
