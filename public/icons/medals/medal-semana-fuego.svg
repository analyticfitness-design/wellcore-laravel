<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="msfOut" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D1D5DB"/>
      <stop offset="35%" stop-color="#9CA3AF"/>
      <stop offset="70%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="msfIn" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="50%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="msfFire" x1="30%" y1="100%" x2="70%" y2="0%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="70%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="msfCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
    <filter id="msfShad" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#111827" flood-opacity="0.6"/>
    </filter>
    <filter id="msfGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="msfPat" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.3" fill="#9CA3AF" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Base shadow -->
  <polygon points="25,4 45,15 45,37 25,48 5,37 5,15" fill="#111827" opacity="0.4"/>

  <!-- Outer beveled hex -->
  <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" fill="url(#msfOut)" filter="url(#msfShad)"/>
  <polygon points="24,3 43,14 43,34 24,45 5,34 5,14" fill="none" stroke="#F3F4F6" stroke-width="0.4" opacity="0.5"/>

  <!-- Inner recessed hex -->
  <polygon points="24,7 39,16 39,32 24,41 9,32 9,16" fill="url(#msfIn)"/>
  <polygon points="24,7 39,16 39,32 24,41 9,32 9,16" fill="url(#msfPat)"/>

  <!-- Engraved ring -->
  <polygon points="24,10 36,17 36,31 24,38 12,31 12,17" fill="none" stroke="#4B5563" stroke-width="0.6"/>
  <polygon points="24,11 35,17.5 35,30.5 24,37 13,30.5 13,17.5" fill="none" stroke="#F3F4F6" stroke-width="0.3" opacity="0.4"/>

  <!-- Abstract flame / energy form -->
  <path d="M24 12 C27 18, 32 20, 32 28 C32 34, 28 37, 24 37 C20 37, 16 34, 16 28 C16 22, 20 19, 22 14 C23 17, 23 20, 24 19 C26 16, 24 14, 24 12Z" fill="url(#msfFire)" filter="url(#msfGlow)"/>
  <path d="M24 18 C26 21, 28 23, 28 28 C28 32, 26 34, 24 34 C22 34, 20 32, 20 28 C20 24, 22 23, 23 20 C24 22, 24 23, 24 22 C25 21, 24 19, 24 18Z" fill="url(#msfCore)" opacity="0.85"/>

  <!-- Flow lines suggesting heat/motion -->
  <path d="M14 24 Q18 20, 24 22 Q30 24, 34 20" fill="none" stroke="#F59E0B" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M14 28 Q18 24, 24 26 Q30 28, 34 24" fill="none" stroke="#F59E0B" stroke-width="0.4" opacity="0.25" stroke-linecap="round"/>

  <!-- Number 7 stylized as cut gem -->
  <path d="M21 16 L27 16 L23 24 L27 24" fill="none" stroke="#FEF3C7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Brushed texture -->
  <line x1="4" y1="13" x2="44" y2="35" stroke="#E5E7EB" stroke-width="0.15" opacity="0.1"/>
  <line x1="4" y1="18" x2="44" y2="40" stroke="#E5E7EB" stroke-width="0.15" opacity="0.1"/>
  <line x1="4" y1="23" x2="44" y2="45" stroke="#E5E7EB" stroke-width="0.15" opacity="0.1"/>

  <!-- Corner facets -->
  <polygon points="24,2 28,4 24,6 20,4" fill="#F3F4F6" opacity="0.3"/>
  <polygon points="44,13 44,17 40,15" fill="#F3F4F6" opacity="0.2"/>
  <polygon points="44,35 44,31 40,33" fill="#374151" opacity="0.3"/>
  <polygon points="24,46 20,44 24,42 28,44" fill="#374151" opacity="0.3"/>
  <polygon points="4,35 4,31 8,33" fill="#374151" opacity="0.3"/>
  <polygon points="4,13 8,15 4,17" fill="#F3F4F6" opacity="0.2"/>
</svg>
