<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="me200Out" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991B1B"/>
      <stop offset="35%" stop-color="#7F1D1D"/>
      <stop offset="70%" stop-color="#450A0A"/>
      <stop offset="100%" stop-color="#280505"/>
    </linearGradient>
    <linearGradient id="me200In" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#450A0A"/>
    </linearGradient>
    <linearGradient id="me200Fire" x1="30%" y1="100%" x2="70%" y2="0%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="70%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="me200Gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="me200Shad" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A0505" flood-opacity="0.8"/>
    </filter>
    <filter id="me200Glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base shadow -->
  <polygon points="25,4 45,15 45,37 25,48 5,37 5,15" fill="#1A0505" opacity="0.7"/>

  <!-- Outer beveled hex -->
  <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" fill="url(#me200Out)" filter="url(#me200Shad)"/>
  <polygon points="24,3 43,14 43,34 24,45 5,34 5,14" fill="none" stroke="#F87171" stroke-width="0.5" opacity="0.5"/>

  <!-- Inner recessed hex -->
  <polygon points="24,7 39,16 39,32 24,41 9,32 9,16" fill="url(#me200In)"/>

  <!-- Engraved ring -->
  <polygon points="24,10 36,17 36,31 24,38 12,31 12,17" fill="none" stroke="#450A0A" stroke-width="0.6"/>
  <polygon points="24,11 35,17.5 35,30.5 24,37 13,30.5 13,17.5" fill="none" stroke="#F87171" stroke-width="0.3" opacity="0.3"/>

  <!-- Legendary barbell - abstract inferno form -->
  <rect x="7" y="21" width="8" height="7" rx="3.5" fill="#450A0A" stroke="#DC2626" stroke-width="0.6" opacity="0.8"/>
  <rect x="33" y="21" width="8" height="7" rx="3.5" fill="#450A0A" stroke="#DC2626" stroke-width="0.6" opacity="0.8"/>
  <rect x="15" y="23.5" width="18" height="2" rx="1" fill="url(#me200Gold)" opacity="0.9"/>

  <!-- Central inferno core -->
  <circle cx="24" cy="24" r="4" fill="url(#me200Fire)" filter="url(#me200Glow)"/>
  <circle cx="24" cy="24" r="2" fill="#FFF7ED" opacity="0.8"/>
  <circle cx="24" cy="24" r="0.8" fill="#fff" opacity="0.9"/>

  <!-- Flame wisps -->
  <path d="M24 12 C26 16, 29 18, 29 22 C29 26, 26 28, 24 28 C22 28, 19 26, 19 22 C19 18, 22 16, 24 12Z" fill="url(#me200Fire)" opacity="0.25" filter="url(#me200Glow)"/>
  <path d="M24 14 C25.5 17, 27 19, 27 22 C27 25, 25.5 26, 24 26 C22.5 26, 21 25, 21 22 C21 19, 22.5 17, 24 14Z" fill="url(#me200Fire)" opacity="0.2" filter="url(#me200Glow)"/>

  <!-- Legendary sparks -->
  <circle cx="8" cy="9" r="0.8" fill="#FDE047" opacity="0.9"/>
  <circle cx="40" cy="9" r="0.8" fill="#FDE047" opacity="0.9"/>
  <circle cx="24" cy="5" r="0.7" fill="#F59E0B" opacity="0.9"/>
  <circle cx="5" cy="38" r="0.7" fill="#DC2626" opacity="0.8"/>
  <circle cx="43" cy="38" r="0.7" fill="#DC2626" opacity="0.8"/>
  <circle cx="24" cy="43" r="0.6" fill="#FDE047" opacity="0.7"/>

  <!-- Brushed texture -->
  <line x1="4" y1="13" x2="44" y2="35" stroke="#F87171" stroke-width="0.15" opacity="0.08"/>
  <line x1="4" y1="18" x2="44" y2="40" stroke="#F87171" stroke-width="0.15" opacity="0.08"/>
  <line x1="4" y1="23" x2="44" y2="45" stroke="#F87171" stroke-width="0.15" opacity="0.08"/>

  <!-- Corner facets -->
  <polygon points="24,2 28,4 24,6 20,4" fill="#F87171" opacity="0.3"/>
  <polygon points="44,13 44,17 40,15" fill="#F87171" opacity="0.2"/>
  <polygon points="44,35 44,31 40,33" fill="#450A0A" opacity="0.4"/>
  <polygon points="24,46 20,44 24,42 28,44" fill="#450A0A" opacity="0.4"/>
  <polygon points="4,35 4,31 8,33" fill="#450A0A" opacity="0.4"/>
  <polygon points="4,13 8,15 4,17" fill="#F87171" opacity="0.2"/>
</svg>
