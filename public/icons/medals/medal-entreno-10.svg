<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="me10Out" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B87333"/>
      <stop offset="35%" stop-color="#8B5A2B"/>
      <stop offset="70%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="me10In" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A67B5B"/>
      <stop offset="50%" stop-color="#6D4C33"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="me10Iron" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D1D5DB"/>
      <stop offset="50%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="me10Red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#B91C1C"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <filter id="me10Shad" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1A0F0A" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Base shadow -->
  <polygon points="25,4 45,15 45,37 25,48 5,37 5,15" fill="#1A0F0A" opacity="0.5"/>

  <!-- Outer beveled hex -->
  <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" fill="url(#me10Out)" filter="url(#me10Shad)"/>
  <polygon points="24,3 43,14 43,34 24,45 5,34 5,14" fill="none" stroke="#D4A574" stroke-width="0.4" opacity="0.5"/>

  <!-- Inner recessed hex -->
  <polygon points="24,7 39,16 39,32 24,41 9,32 9,16" fill="url(#me10In)"/>

  <!-- Engraved ring -->
  <polygon points="24,10 36,17 36,31 24,38 12,31 12,17" fill="none" stroke="#5C3A1E" stroke-width="0.6"/>
  <polygon points="24,11 35,17.5 35,30.5 24,37 13,30.5 13,17.5" fill="none" stroke="#D4A574" stroke-width="0.3" opacity="0.4"/>

  <!-- Abstract barbell / repetition pattern -->
  <rect x="10" y="20" width="6" height="10" rx="3" fill="url(#me10Red)" opacity="0.85"/>
  <rect x="11" y="21" width="4" height="8" rx="2" fill="none" stroke="#EF4444" stroke-width="0.3" opacity="0.5"/>
  <rect x="32" y="20" width="6" height="10" rx="3" fill="url(#me10Red)" opacity="0.85"/>
  <rect x="33" y="21" width="4" height="8" rx="2" fill="none" stroke="#EF4444" stroke-width="0.3" opacity="0.5"/>
  <rect x="16" y="23.5" width="16" height="3" rx="1.5" fill="url(#me10Iron)"/>
  <line x1="18" y1="24.5" x2="18" y2="25.5" stroke="#374151" stroke-width="0.3" opacity="0.5"/>
  <line x1="20" y1="24.5" x2="20" y2="25.5" stroke="#374151" stroke-width="0.3" opacity="0.5"/>
  <line x1="28" y1="24.5" x2="28" y2="25.5" stroke="#374151" stroke-width="0.3" opacity="0.5"/>
  <line x1="30" y1="24.5" x2="30" y2="25.5" stroke="#374151" stroke-width="0.3" opacity="0.5"/>

  <!-- Repetition lines suggesting sets -->
  <line x1="24" y1="14" x2="24" y2="18" stroke="#D4A574" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="24" y1="32" x2="24" y2="36" stroke="#D4A574" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Center ring detail -->
  <circle cx="24" cy="25" r="2" fill="none" stroke="#D4A574" stroke-width="0.5" opacity="0.5"/>
  <circle cx="24" cy="25" r="0.8" fill="#D4A574" opacity="0.6"/>

  <!-- Brushed texture -->
  <line x1="4" y1="13" x2="44" y2="35" stroke="#D4A574" stroke-width="0.15" opacity="0.08"/>
  <line x1="4" y1="18" x2="44" y2="40" stroke="#D4A574" stroke-width="0.15" opacity="0.08"/>
  <line x1="4" y1="23" x2="44" y2="45" stroke="#D4A574" stroke-width="0.15" opacity="0.08"/>

  <!-- Corner facets -->
  <polygon points="24,2 28,4 24,6 20,4" fill="#D4A574" opacity="0.3"/>
  <polygon points="44,13 44,17 40,15" fill="#D4A574" opacity="0.2"/>
  <polygon points="44,35 44,31 40,33" fill="#5C3A1E" opacity="0.3"/>
  <polygon points="24,46 20,44 24,42 28,44" fill="#5C3A1E" opacity="0.3"/>
  <polygon points="4,35 4,31 8,33" fill="#5C3A1E" opacity="0.3"/>
  <polygon points="4,13 8,15 4,17" fill="#D4A574" opacity="0.2"/>
</svg>
