<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="mweOut" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991B1B"/>
      <stop offset="35%" stop-color="#7F1D1D"/>
      <stop offset="70%" stop-color="#450A0A"/>
      <stop offset="100%" stop-color="#280505"/>
    </linearGradient>
    <linearGradient id="mweIn" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#991B1B"/>
      <stop offset="100%" stop-color="#450A0A"/>
    </linearGradient>
    <linearGradient id="mweGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="mweCrimson" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <filter id="mweShad" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A0505" flood-opacity="0.8"/>
    </filter>
    <filter id="mweGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base shadow -->
  <polygon points="25,4 45,15 45,37 25,48 5,37 5,15" fill="#1A0505" opacity="0.7"/>

  <!-- Outer beveled hex -->
  <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" fill="url(#mweOut)" filter="url(#mweShad)"/>
  <polygon points="24,3 43,14 43,34 24,45 5,34 5,14" fill="none" stroke="#FDE047" stroke-width="0.5" opacity="0.6"/>

  <!-- Inner recessed hex -->
  <polygon points="24,7 39,16 39,32 24,41 9,32 9,16" fill="url(#mweIn)"/>

  <!-- Engraved ring -->
  <polygon points="24,10 36,17 36,31 24,38 12,31 12,17" fill="none" stroke="#450A0A" stroke-width="0.6"/>
  <polygon points="24,11 35,17.5 35,30.5 24,37 13,30.5 13,17.5" fill="none" stroke="#FDE047" stroke-width="0.3" opacity="0.4"/>

  <!-- Elite shield form - geometric perfection -->
  <path d="M24 12 L34 16 L34 26 C34 32, 29 36, 24 38 C19 36, 14 32, 14 26 L14 16Z" fill="url(#mweCrimson)" filter="url(#mweGlow)"/>
  <path d="M24 14 L32 17.5 L32 26 C32 31, 28 34, 24 36 C20 34, 16 31, 16 26 L16 17.5Z" fill="none" stroke="#FDE047" stroke-width="0.4" opacity="0.4"/>

  <!-- W monogram stylized -->
  <path d="M18 22 L20 30 L24 24 L28 30 L30 22" fill="none" stroke="url(#mweGold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#mweGlow)"/>
  <circle cx="24" cy="21" r="1.5" fill="#FDE047" filter="url(#mweGlow)"/>

  <!-- Elite crown -->
  <path d="M19 13 L21 11 L24 12 L27 11 L29 13" fill="none" stroke="#FDE047" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="24" cy="11.5" r="1" fill="#FDE047"/>

  <!-- Legendary aura dots -->
  <circle cx="8" cy="8" r="0.8" fill="#FDE047" opacity="0.9"/>
  <circle cx="40" cy="8" r="0.8" fill="#FDE047" opacity="0.9"/>
  <circle cx="24" cy="4" r="0.7" fill="#FDE047" opacity="0.9"/>
  <circle cx="5" cy="40" r="0.7" fill="#DC2626" opacity="0.8"/>
  <circle cx="43" cy="40" r="0.7" fill="#DC2626" opacity="0.8"/>
  <circle cx="24" cy="44" r="0.6" fill="#FDE047" opacity="0.8"/>

  <!-- Brushed texture -->
  <line x1="4" y1="13" x2="44" y2="35" stroke="#F87171" stroke-width="0.15" opacity="0.08"/>
  <line x1="4" y1="18" x2="44" y2="40" stroke="#F87171" stroke-width="0.15" opacity="0.08"/>
  <line x1="4" y1="23" x2="44" y2="45" stroke="#F87171" stroke-width="0.15" opacity="0.08"/>

  <!-- Corner facets -->
  <polygon points="24,2 28,4 24,6 20,4" fill="#FDE047" opacity="0.4"/>
  <polygon points="44,13 44,17 40,15" fill="#FDE047" opacity="0.3"/>
  <polygon points="44,35 44,31 40,33" fill="#450A0A" opacity="0.4"/>
  <polygon points="24,46 20,44 24,42 28,44" fill="#450A0A" opacity="0.4"/>
  <polygon points="4,35 4,31 8,33" fill="#450A0A" opacity="0.4"/>
  <polygon points="4,13 8,15 4,17" fill="#FDE047" opacity="0.3"/>
</svg>
