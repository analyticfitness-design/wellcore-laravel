<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="mmlOut" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="35%" stop-color="#B8860B"/>
      <stop offset="70%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5C4D26"/>
    </linearGradient>
    <linearGradient id="mmlIn" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F4D03F"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="mmlPure" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="50%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="mmlShad" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#3D2B07" flood-opacity="0.7"/>
    </filter>
    <filter id="mmlGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base shadow -->
  <polygon points="25,4 45,15 45,37 25,48 5,37 5,15" fill="#3D2B07" opacity="0.5"/>

  <!-- Outer beveled hex -->
  <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" fill="url(#mmlOut)" filter="url(#mmlShad)"/>
  <polygon points="24,3 43,14 43,34 24,45 5,34 5,14" fill="none" stroke="#FDE68A" stroke-width="0.4" opacity="0.5"/>

  <!-- Inner recessed hex -->
  <polygon points="24,7 39,16 39,32 24,41 9,32 9,16" fill="url(#mmlIn)"/>

  <!-- Engraved ring -->
  <polygon points="24,10 36,17 36,31 24,38 12,31 12,17" fill="none" stroke="#8B6914" stroke-width="0.6"/>
  <polygon points="24,11 35,17.5 35,30.5 24,37 13,30.5 13,17.5" fill="none" stroke="#FDE68A" stroke-width="0.3" opacity="0.4"/>

  <!-- Abstract purity form - concentric purity rings -->
  <circle cx="24" cy="24" r="10" fill="none" stroke="url(#mmlPure)" stroke-width="1.5" opacity="0.5" filter="url(#mmlGlow)"/>
  <circle cx="24" cy="24" r="7" fill="none" stroke="url(#mmlPure)" stroke-width="1" opacity="0.4"/>
  <circle cx="24" cy="24" r="4" fill="url(#mmlPure)" opacity="0.3" filter="url(#mmlGlow)"/>
  <circle cx="24" cy="24" r="1.5" fill="#F0FDF4" opacity="0.8"/>

  <!-- Clean break lines suggesting discipline -->
  <line x1="14" y1="24" x2="18" y2="24" stroke="#22C55E" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="30" y1="24" x2="34" y2="24" stroke="#22C55E" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="24" y2="18" stroke="#22C55E" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="24" y1="30" x2="24" y2="34" stroke="#22C55E" stroke-width="0.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Checkmark gem -->
  <polygon points="18,22 22,26 30,18 31,19 22,28 17,23" fill="url(#mmlPure)" opacity="0.6" filter="url(#mmlGlow)"/>

  <!-- Brushed texture -->
  <line x1="4" y1="13" x2="44" y2="35" stroke="#FDE68A" stroke-width="0.15" opacity="0.1"/>
  <line x1="4" y1="18" x2="44" y2="40" stroke="#FDE68A" stroke-width="0.15" opacity="0.1"/>
  <line x1="4" y1="23" x2="44" y2="45" stroke="#FDE68A" stroke-width="0.15" opacity="0.1"/>

  <!-- Corner facets -->
  <polygon points="24,2 28,4 24,6 20,4" fill="#FDE68A" opacity="0.35"/>
  <polygon points="44,13 44,17 40,15" fill="#FDE68A" opacity="0.25"/>
  <polygon points="44,35 44,31 40,33" fill="#8B6914" opacity="0.35"/>
  <polygon points="24,46 20,44 24,42 28,44" fill="#8B6914" opacity="0.35"/>
  <polygon points="4,35 4,31 8,33" fill="#8B6914" opacity="0.35"/>
  <polygon points="4,13 8,15 4,17" fill="#FDE68A" opacity="0.25"/>
</svg>
