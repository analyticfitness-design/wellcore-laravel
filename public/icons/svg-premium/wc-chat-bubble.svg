<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcChatBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wcChatInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="wcChatDot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="wcChatGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcChatShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="42" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Bubble shadow -->
  <path d="M8 12 Q8 8 12 8 L36 8 Q40 8 40 12 L40 30 Q40 34 36 34 L20 34 L12 40 L14 34 L12 34 Q8 34 8 30Z" fill="#000" opacity="0.2" transform="translate(0,0.8)"/>

  <!-- Bubble body -->
  <path d="M8 12 Q8 8 12 8 L36 8 Q40 8 40 12 L40 30 Q40 34 36 34 L20 34 L12 40 L14 34 L12 34 Q8 34 8 30Z" fill="url(#wcChatBase)" filter="url(#wcChatShadow)"/>
  <!-- Bubble highlight -->
  <path d="M9 12 Q9 9 12 9 L36 9 Q39 9 39 12 L39 29 Q39 32 36 32 L20.5 32 L13.5 37 L15 32 L12 32 Q9 32 9 29Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Inner recessed -->
  <path d="M11 14 Q11 11 14 11 L34 11 Q37 11 37 14 L37 27 Q37 30 34 30 L21 30 L16 33 L17.5 30 L14 30 Q11 30 11 27Z" fill="url(#wcChatInner)" opacity="0.4"/>

  <!-- Dot 1 -->
  <circle cx="17" cy="22" r="2" fill="url(#wcChatDot)" filter="url(#wcChatGlow)"/>
  <circle cx="17" cy="21.7" r="0.6" fill="#fff" opacity="0.6"/>

  <!-- Dot 2 -->
  <circle cx="24" cy="22" r="2" fill="url(#wcChatDot)" filter="url(#wcChatGlow)" opacity="0.85"/>
  <circle cx="24" cy="21.7" r="0.6" fill="#fff" opacity="0.5"/>

  <!-- Dot 3 -->
  <circle cx="31" cy="22" r="2" fill="url(#wcChatDot)" filter="url(#wcChatGlow)" opacity="0.65"/>
  <circle cx="31" cy="21.7" r="0.6" fill="#fff" opacity="0.4"/>
</svg>
