<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Shield base gradient: 4 stops for depth -->
    <linearGradient id="wcLogoShieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="70%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <!-- Metallic bevel highlight -->
    <linearGradient id="wcLogoMetalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="40%" stop-color="#DC2626"/>
      <stop offset="80%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <!-- Inner recessed shadow gradient -->
    <linearGradient id="wcLogoInnerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <!-- Glow filter for W letter and center -->
    <filter id="wcLogoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow for 3D lift -->
    <filter id="wcLogoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#450a0a" flood-opacity="0.5"/>
    </filter>
    <!-- Brushed metal texture pattern -->
    <pattern id="wcLogoBrushed" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="4" y2="2" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
    </pattern>
  </defs>

  <!-- Outer shield shadow layer -->
  <path d="M24 2 L42 8 C42 8 44 28 40 36 C36 44 24 46 24 46 C24 46 12 44 8 36 C4 28 6 8 6 8 L24 2Z"
        fill="#000" opacity="0.3" transform="translate(0,1.5)"/>

  <!-- Main shield body -->
  <path d="M24 2 L42 8 C42 8 44 28 40 36 C36 44 24 46 24 46 C24 46 12 44 8 36 C4 28 6 8 6 8 L24 2Z"
        fill="url(#wcLogoShieldGrad)" filter="url(#wcLogoShadow)" stroke="#fca5a5" stroke-width="0.6"/>

  <!-- Brushed metal texture overlay -->
  <path d="M24 2 L42 8 C42 8 44 28 40 36 C36 44 24 46 24 46 C24 46 12 44 8 36 C4 28 6 8 6 8 L24 2Z"
        fill="url(#wcLogoBrushed)" opacity="0.6"/>

  <!-- Inner bevel highlight -->
  <path d="M24 4 L40 9.5 C40 9.5 41.5 27 38 34 C34.5 41 24 43 24 43 C24 43 13.5 41 10 34 C6.5 27 8 9.5 8 9.5 L24 4Z"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

  <!-- Inner recessed panel -->
  <path d="M24 6 L38 10.5 C38 10.5 39.5 26 36 32 C33 38 24 40 24 40 C24 40 15 38 12 32 C8.5 26 10 10.5 10 10.5 L24 6Z"
        fill="url(#wcLogoInnerGrad)" opacity="0.5"/>

  <!-- W letter stylized (outer stroke for depth) -->
  <path d="M14 16 L18 32 L24 22 L30 32 L34 16"
        fill="none" stroke="#450a0a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" transform="translate(0,0.8)"/>

  <!-- W letter main -->
  <path d="M14 16 L18 32 L24 22 L30 32 L34 16"
        fill="none" stroke="url(#wcLogoMetalGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#wcLogoGlow)"/>

  <!-- W letter inner highlight -->
  <path d="M14 16 L18 32 L24 22 L30 32 L34 16"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Center dot outer -->
  <circle cx="24" cy="20" r="3.2" fill="#450a0a" opacity="0.5"/>

  <!-- Center dot main -->
  <circle cx="24" cy="20" r="2.5" fill="#fff" filter="url(#wcLogoGlow)"/>

  <!-- Center dot highlight -->
  <circle cx="23" cy="19" r="1" fill="#fca5a5" opacity="0.8"/>

  <!-- Decorative rivets with depth -->
  <circle cx="12" cy="12" r="1.3" fill="#450a0a" opacity="0.4"/>
  <circle cx="12" cy="12" r="1" fill="#fca5a5" opacity="0.8"/>
  <circle cx="11.7" cy="11.7" r="0.4" fill="#fff" opacity="0.5"/>

  <circle cx="36" cy="12" r="1.3" fill="#450a0a" opacity="0.4"/>
  <circle cx="36" cy="12" r="1" fill="#fca5a5" opacity="0.8"/>
  <circle cx="35.7" cy="11.7" r="0.4" fill="#fff" opacity="0.5"/>

  <circle cx="24" cy="40" r="1.3" fill="#450a0a" opacity="0.4"/>
  <circle cx="24" cy="40" r="1" fill="#fca5a5" opacity="0.8"/>
  <circle cx="23.7" cy="39.7" r="0.4" fill="#fff" opacity="0.5"/>

  <!-- Top highlight arc -->
  <path d="M12 8 Q24 3 36 8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6" stroke-linecap="round"/>
</svg>
