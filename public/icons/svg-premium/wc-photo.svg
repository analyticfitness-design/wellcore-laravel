<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcPhotoFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="30%" stop-color="#7c3aed"/>
      <stop offset="70%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <linearGradient id="wcPhotoLens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="wcPhotoFlash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="wcPhotoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcPhotoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3b0764" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Frame shadow -->
  <rect x="6" y="9.5" width="36" height="30" rx="4" fill="#000" opacity="0.2"/>

  <!-- Frame outer -->
  <rect x="6" y="9" width="36" height="30" rx="4" fill="url(#wcPhotoFrame)" filter="url(#wcPhotoShadow)"/>
  <!-- Frame bevel highlight -->
  <rect x="6.5" y="9.5" width="35" height="3" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Inner frame -->
  <rect x="9" y="12" width="30" height="24" rx="2" fill="#2e1065" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Lens center -->
  <circle cx="24" cy="24" r="8" fill="url(#wcPhotoLens)" filter="url(#wcPhotoGlow)"/>
  <!-- Lens inner -->
  <circle cx="24" cy="24" r="5" fill="rgba(0,0,0,0.2)"/>
  <circle cx="24" cy="24" r="3" fill="#a78bfa" opacity="0.4"/>

  <!-- Lens reflection -->
  <circle cx="21.5" cy="21.5" r="1.5" fill="#fff" opacity="0.3"/>
  <ellipse cx="26" cy="26.5" rx="1" ry="0.7" fill="#fff" opacity="0.15"/>

  <!-- Flash in corner -->
  <circle cx="35" cy="14" r="2.5" fill="url(#wcPhotoFlash)" filter="url(#wcPhotoGlow)"/>
  <circle cx="34.7" cy="13.7" r="0.8" fill="#fff" opacity="0.7"/>

  <!-- Top mount (camera style) -->
  <rect x="18" y="6" width="12" height="4" rx="2" fill="url(#wcPhotoFrame)"/>
  <rect x="19" y="6.5" width="10" height="1.5" rx="0.75" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.3"/>
</svg>
