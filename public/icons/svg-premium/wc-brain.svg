<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcBrainBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="30%" stop-color="#7c3aed"/>
      <stop offset="70%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="wcBrainCircuit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="wcBrainGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcBrainShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#2e1065" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="10" ry="2" fill="#000" opacity="0.25"/>

  <!-- Brain shadow -->
  <path d="M14 16 Q14 8 24 8 Q34 8 34 16 Q38 18 38 24 Q38 30 32 32 Q30 36 24 36 Q18 36 16 32 Q10 30 10 24 Q10 18 14 16Z" fill="#000" opacity="0.2" transform="translate(0,0.8)"/>

  <!-- Brain body -->
  <path d="M14 16 Q14 8 24 8 Q34 8 34 16 Q38 18 38 24 Q38 30 32 32 Q30 36 24 36 Q18 36 16 32 Q10 30 10 24 Q10 18 14 16Z" fill="url(#wcBrainBase)" filter="url(#wcBrainShadow)"/>

  <!-- Brain highlight edge -->
  <path d="M15 16 Q15 9 24 9 Q33 9 33 16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Central fissure -->
  <path d="M24 10 Q24 18 24 24 Q24 30 24 35" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>

  <!-- Circuit lines left -->
  <path d="M16 14 Q18 12 20 14 Q22 16 20 18" fill="none" stroke="url(#wcBrainCircuit)" stroke-width="0.8" stroke-linecap="round" filter="url(#wcBrainGlow)"/>
  <path d="M14 22 Q16 20 18 22 Q20 24 18 26" fill="none" stroke="url(#wcBrainCircuit)" stroke-width="0.8" stroke-linecap="round" filter="url(#wcBrainGlow)"/>
  <circle cx="20" cy="14" r="1" fill="#c4b5fd" filter="url(#wcBrainGlow)"/>
  <circle cx="18" cy="26" r="1" fill="#c4b5fd" filter="url(#wcBrainGlow)"/>

  <!-- Circuit lines right -->
  <path d="M28 14 Q30 12 32 14 Q34 16 32 18" fill="none" stroke="url(#wcBrainCircuit)" stroke-width="0.8" stroke-linecap="round" filter="url(#wcBrainGlow)"/>
  <path d="M30 22 Q32 20 34 22 Q36 24 34 26" fill="none" stroke="url(#wcBrainCircuit)" stroke-width="0.8" stroke-linecap="round" filter="url(#wcBrainGlow)"/>
  <circle cx="28" cy="14" r="1" fill="#c4b5fd" filter="url(#wcBrainGlow)"/>
  <circle cx="34" cy="26" r="1" fill="#c4b5fd" filter="url(#wcBrainGlow)"/>

  <!-- Central glow node -->
  <circle cx="24" cy="22" r="2" fill="#c4b5fd" filter="url(#wcBrainGlow)"/>
  <circle cx="24" cy="22" r="0.8" fill="#fff" opacity="0.6"/>
</svg>
