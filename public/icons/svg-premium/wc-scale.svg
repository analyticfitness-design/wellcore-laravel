<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="scBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="scTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="scDial" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="scGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#064e3b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Scale base platform -->
  <rect x="4" y="36" width="40" height="7" rx="3.5" fill="url(#scBody)" filter="url(#scShadow)"/>
  <rect x="6" y="38" width="36" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Scale pillar -->
  <rect x="20" y="26" width="8" height="11" rx="1" fill="url(#scBody)" filter="url(#scShadow)"/>
  <rect x="21" y="27" width="6" height="9" rx="0.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Scale top platform -->
  <rect x="2" y="22" width="44" height="6" rx="3" fill="url(#scTop)" filter="url(#scShadow)"/>
  <rect x="4" y="24" width="40" height="2" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Dial circle -->
  <circle cx="24" cy="14" r="10" fill="url(#scBody)" filter="url(#scShadow)"/>
  <circle cx="24" cy="14" r="8" fill="#064e3b" stroke="#34d399" stroke-width="0.5"/>

  <!-- Dial ticks -->
  <line x1="24" y1="6" x2="24" y2="7.5" stroke="#34d399" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="24" y1="20.5" x2="24" y2="22" stroke="#34d399" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="16" y1="14" x2="17.5" y2="14" stroke="#34d399" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="30.5" y1="14" x2="32" y2="14" stroke="#34d399" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="18.3" y1="8.3" x2="19.4" y2="9.4" stroke="#34d399" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>
  <line x1="28.6" y1="18.6" x2="29.7" y2="19.7" stroke="#34d399" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>
  <line x1="18.3" y1="19.7" x2="19.4" y2="18.6" stroke="#34d399" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>
  <line x1="28.6" y1="9.4" x2="29.7" y2="8.3" stroke="#34d399" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>

  <!-- Dial needle -->
  <line x1="24" y1="14" x2="30" y2="10" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" filter="url(#scGlow)"/>
  <circle cx="24" cy="14" r="2" fill="#fbbf24" filter="url(#scGlow)"/>
  <circle cx="24" cy="14" r="0.8" fill="#fff" opacity="0.8"/>

  <!-- Measurement marks on base -->
  <line x1="8" y1="39" x2="12" y2="39" stroke="#a7f3d0" stroke-width="0.5" opacity="0.6"/>
  <line x1="36" y1="39" x2="40" y2="39" stroke="#a7f3d0" stroke-width="0.5" opacity="0.6"/>
</svg>
