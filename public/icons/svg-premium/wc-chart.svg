<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcChartBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="30%" stop-color="#10b981"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="wcChartBar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="wcChartBar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="wcChartBar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="wcChartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="wcChartGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcChartShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#064e3b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Base plate shadow -->
  <rect x="6" y="8.5" width="36" height="32" rx="3" fill="#000" opacity="0.2"/>

  <!-- Base plate -->
  <rect x="6" y="8" width="36" height="32" rx="3" fill="url(#wcChartBase)" filter="url(#wcChartShadow)"/>
  <!-- Base highlight -->
  <rect x="6.5" y="8.5" width="35" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Chart area inner -->
  <rect x="10" y="12" width="28" height="24" rx="2" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.08)" stroke-width="0.3"/>

  <!-- Bar 1 (left, medium) -->
  <rect x="13" y="24" width="5" height="10" rx="1" fill="url(#wcChartBar1)"/>
  <rect x="13.5" y="24.5" width="4" height="2" rx="0.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.3"/>

  <!-- Bar 2 (center, tallest) -->
  <rect x="21.5" y="16" width="5" height="18" rx="1" fill="url(#wcChartBar2)"/>
  <rect x="22" y="16.5" width="4" height="3" rx="0.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.3"/>

  <!-- Bar 3 (right, short) -->
  <rect x="30" y="28" width="5" height="6" rx="1" fill="url(#wcChartBar3)"/>
  <rect x="30.5" y="28.5" width="4" height="1.5" rx="0.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.3"/>

  <!-- Trend line connecting tops -->
  <path d="M15.5 24 L24 16 L32.5 28" fill="none" stroke="url(#wcChartLine)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#wcChartGlow)"/>

  <!-- Data points on trend line -->
  <circle cx="15.5" cy="24" r="1.5" fill="#a7f3d0" filter="url(#wcChartGlow)"/>
  <circle cx="24" cy="16" r="1.8" fill="#6ee7b7" filter="url(#wcChartGlow)"/>
  <circle cx="32.5" cy="28" r="1.5" fill="#34d399" filter="url(#wcChartGlow)"/>

  <!-- Point highlights -->
  <circle cx="15.5" cy="24" r="0.6" fill="#fff" opacity="0.6"/>
  <circle cx="24" cy="16" r="0.7" fill="#fff" opacity="0.7"/>
  <circle cx="32.5" cy="28" r="0.6" fill="#fff" opacity="0.6"/>
</svg>
