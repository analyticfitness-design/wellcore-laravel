<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcWrenchBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="30%" stop-color="#a1a1aa"/>
      <stop offset="70%" stop-color="#71717a"/>
      <stop offset="100%" stop-color="#52525b"/>
    </linearGradient>
    <linearGradient id="wcWrenchHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e4e4e7"/>
      <stop offset="50%" stop-color="#a1a1aa"/>
      <stop offset="100%" stop-color="#52525b"/>
    </linearGradient>
    <filter id="wcWrenchShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="10" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Handle shadow -->
  <rect x="20" y="8.5" width="8" height="30" rx="4" fill="#000" opacity="0.2" transform="rotate(45 24 24)"/>

  <!-- Handle -->
  <rect x="20" y="8" width="8" height="30" rx="4" fill="url(#wcWrenchBase)" filter="url(#wcWrenchShadow)" transform="rotate(45 24 24)"/>
  <!-- Handle highlight -->
  <rect x="20.5" y="8.5" width="7" height="4" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.3" transform="rotate(45 24 24)"/>

  <!-- Grip texture lines -->
  <line x1="19.5" y1="14" x2="28.5" y2="23" stroke="#52525b" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="15.5" x2="27" y2="24.5" stroke="#52525b" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="16.5" y1="17" x2="25.5" y2="26" stroke="#52525b" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="15" y1="18.5" x2="24" y2="27.5" stroke="#52525b" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Head shadow -->
  <circle cx="34" cy="10" r="7" fill="#000" opacity="0.2"/>

  <!-- Head outer -->
  <circle cx="34" cy="10" r="7" fill="url(#wcWrenchHead)" filter="url(#wcWrenchShadow)"/>
  <!-- Head highlight -->
  <circle cx="34" cy="10" r="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Jaw opening -->
  <path d="M30 6 L38 6 L36 10 L38 14 L30 14 L32 10Z" fill="#27272a"/>
  <path d="M31 7 L37 7 L35.5 10 L37 13 L31 13 L32.5 10Z" fill="#3f3f46" opacity="0.5"/>

  <!-- Adjustment screw -->
  <circle cx="34" cy="10" r="1.5" fill="#71717a" stroke="#52525b" stroke-width="0.3"/>
  <line x1="33" y1="10" x2="35" y2="10" stroke="#d4d4d8" stroke-width="0.5"/>
</svg>
