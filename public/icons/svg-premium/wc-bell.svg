<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcBellBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="wcBellInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="wcBellWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="wcBellGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcBellShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#78350f" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="9" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Bell shadow -->
  <path d="M12 30 Q12 10 24 10 Q36 10 36 30 L38 34 L10 34Z" fill="#000" opacity="0.2" transform="translate(0,0.5)"/>

  <!-- Bell body -->
  <path d="M12 30 Q12 10 24 10 Q36 10 36 30 L38 34 L10 34Z" fill="url(#wcBellBase)" filter="url(#wcBellShadow)"/>
  <!-- Bell body highlight -->
  <path d="M13 29 Q13 11 24 11 Q35 11 35 29" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Inner bell shadow line -->
  <path d="M14 28 Q14 14 24 14 Q34 14 34 28" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>

  <!-- Clapper -->
  <circle cx="24" cy="36" r="4" fill="url(#wcBellInner)" stroke="#fde68a" stroke-width="0.4"/>
  <circle cx="24" cy="36" r="2.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Sound waves left -->
  <path d="M8 22 Q5 24 8 26" fill="none" stroke="url(#wcBellWave)" stroke-width="1.5" stroke-linecap="round" opacity="0.6" filter="url(#wcBellGlow)"/>
  <path d="M5 19 Q1 24 5 29" fill="none" stroke="url(#wcBellWave)" stroke-width="1" stroke-linecap="round" opacity="0.35" filter="url(#wcBellGlow)"/>

  <!-- Sound waves right -->
  <path d="M40 22 Q43 24 40 26" fill="none" stroke="url(#wcBellWave)" stroke-width="1.5" stroke-linecap="round" opacity="0.6" filter="url(#wcBellGlow)"/>
  <path d="M43 19 Q47 24 43 29" fill="none" stroke="url(#wcBellWave)" stroke-width="1" stroke-linecap="round" opacity="0.35" filter="url(#wcBellGlow)"/>

  <!-- Top loop -->
  <circle cx="24" cy="9" r="2" fill="url(#wcBellBase)" stroke="#fde68a" stroke-width="0.4"/>
  <circle cx="24" cy="9" r="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.3"/>
</svg>
