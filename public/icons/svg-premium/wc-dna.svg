<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcDnaStrand1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="wcDnaStrand2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="wcDnaRung" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="wcDnaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcDnaShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#6d28d9" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="8" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Strand 1 (left/front) -->
  <path d="M18 6 Q14 12 18 18 Q22 24 18 30 Q14 36 18 42" fill="none" stroke="url(#wcDnaStrand1)" stroke-width="3" stroke-linecap="round" filter="url(#wcDnaShadow)"/>

  <!-- Strand 2 (right/back) -->
  <path d="M30 6 Q34 12 30 18 Q26 24 30 30 Q34 36 30 42" fill="none" stroke="url(#wcDnaStrand2)" stroke-width="3" stroke-linecap="round" filter="url(#wcDnaShadow)"/>

  <!-- Rungs -->
  <line x1="17" y1="12" x2="31" y2="12" stroke="url(#wcDnaRung)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="19" y1="18" x2="29" y2="18" stroke="url(#wcDnaRung)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="17" y1="24" x2="31" y2="24" stroke="url(#wcDnaRung)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="19" y1="30" x2="29" y2="30" stroke="url(#wcDnaRung)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="17" y1="36" x2="31" y2="36" stroke="url(#wcDnaRung)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Glow nodes at crossovers -->
  <circle cx="18" cy="18" r="2" fill="#f472b6" filter="url(#wcDnaGlow)"/>
  <circle cx="30" cy="18" r="2" fill="#8b5cf6" filter="url(#wcDnaGlow)"/>
  <circle cx="18" cy="30" r="2" fill="#f472b6" filter="url(#wcDnaGlow)"/>
  <circle cx="30" cy="30" r="2" fill="#8b5cf6" filter="url(#wcDnaGlow)"/>
</svg>
