<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcSetBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="30%" stop-color="#6b7280"/>
      <stop offset="70%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="wcSetCenter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="50%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </linearGradient>
    <linearGradient id="wcSetW" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <filter id="wcSetGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcSetShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1f2937" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Gear shadow -->
  <circle cx="24" cy="24.5" r="17" fill="#000" opacity="0.2"/>

  <!-- Gear body (6 teeth) -->
  <path d="M24 4 L27 4 L28.5 9.5 L32.5 7 L35 9.5 L32.5 13.5 L38 15 L38 18 L43 19.5 L43 22.5 L38 24 L38 27 L43 28.5 L43 31.5 L38 33 L38 36 L32.5 37.5 L35 41.5 L32.5 44 L28.5 41.5 L27 47 L24 47 L21 47 L19.5 41.5 L15.5 44 L13 41.5 L15.5 37.5 L10 36 L10 33 L5 31.5 L5 28.5 L10 27 L10 24 L5 22.5 L5 19.5 L10 18 L10 15 L15.5 13.5 L13 9.5 L15.5 7 L19.5 9.5 L21 4 L24 4Z" fill="url(#wcSetBase)" filter="url(#wcSetShadow)"/>

  <!-- Gear bevel highlight -->
  <circle cx="24" cy="24" r="16.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Inner circle -->
  <circle cx="24" cy="24" r="10" fill="url(#wcSetCenter)" stroke="rgba(255,255,255,0.1)" stroke-width="0.4"/>

  <!-- Center W WellCore -->
  <path d="M19 20 L21 28 L24 23 L27 28 L29 20" fill="none" stroke="url(#wcSetW)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#wcSetGlow)"/>
  <circle cx="24" cy="22" r="1.2" fill="#fca5a5" filter="url(#wcSetGlow)"/>

  <!-- Screws at 3 positions -->
  <circle cx="24" cy="10.5" r="1.5" fill="#4b5563" stroke="#6b7280" stroke-width="0.3"/>
  <line x1="23.2" y1="10.5" x2="24.8" y2="10.5" stroke="#9ca3af" stroke-width="0.3"/>

  <circle cx="35.5" cy="30" r="1.5" fill="#4b5563" stroke="#6b7280" stroke-width="0.3"/>
  <line x1="34.7" y1="30" x2="36.3" y2="30" stroke="#9ca3af" stroke-width="0.3" transform="rotate(60 35.5 30)"/>

  <circle cx="12.5" cy="30" r="1.5" fill="#4b5563" stroke="#6b7280" stroke-width="0.3"/>
  <line x1="11.7" y1="30" x2="13.3" y2="30" stroke="#9ca3af" stroke-width="0.3" transform="rotate(-60 12.5 30)"/>
</svg>
