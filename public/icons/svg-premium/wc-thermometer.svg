<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcThermBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="70%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="wcThermLiquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <filter id="wcThermGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcThermShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#450a0a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="7" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Bulb shadow -->
  <circle cx="24" cy="38" r="6" fill="#000" opacity="0.2"/>

  <!-- Bulb -->
  <circle cx="24" cy="38" r="6" fill="url(#wcThermBase)" filter="url(#wcThermShadow)"/>
  <circle cx="24" cy="38" r="5.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Stem shadow -->
  <rect x="21" y="8.5" width="6" height="30" rx="3" fill="#000" opacity="0.2"/>

  <!-- Stem -->
  <rect x="21" y="8" width="6" height="30" rx="3" fill="url(#wcThermBase)" filter="url(#wcThermShadow)"/>
  <rect x="21.5" y="8.5" width="5" height="4" rx="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.3"/>

  <!-- Liquid column -->
  <rect x="22.5" y="18" width="3" height="20" rx="1.5" fill="url(#wcThermLiquid)" filter="url(#wcThermGlow)"/>

  <!-- Scale marks -->
  <line x1="28" y1="12" x2="30" y2="12" stroke="rgba(255,255,255,0.3)" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="30" y2="16" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="28" y1="20" x2="30" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="28" y1="24" x2="30" y2="24" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="30" y2="28" stroke="rgba(255,255,255,0.3)" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="28" y1="32" x2="30" y2="32" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" stroke-linecap="round"/>
</svg>
