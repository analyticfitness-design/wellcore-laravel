<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="crownBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="crownInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="crownJewel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <filter id="crownGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crownShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#92400e" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Crown band -->
  <path d="M8 32 L8 26 L16 20 L24 28 L32 20 L40 26 L40 32 Q24 36 8 32Z" fill="url(#crownBody)" filter="url(#crownShadow)" stroke="#fde68a" stroke-width="0.6"/>
  
  <!-- Inner band highlight -->
  <path d="M10 30 L10 26.5 L16 22 L24 29 L32 22 L38 26.5 L38 30 Q24 33 10 30Z" fill="url(#crownInner)" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Bottom rim -->
  <rect x="7" y="32" width="34" height="5" rx="2.5" fill="url(#crownBody)" filter="url(#crownShadow)"/>
  <rect x="9" y="33" width="30" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Left point -->
  <path d="M8 26 L4 14 L12 20Z" fill="url(#crownBody)" filter="url(#crownShadow)"/>
  <path d="M8 25 L6 17 L10 20Z" fill="#fde68a" opacity="0.4"/>

  <!-- Center point -->
  <path d="M24 28 L24 10 L30 20Z" fill="url(#crownBody)" filter="url(#crownShadow)"/>
  <path d="M24 26 L24 14 L27 20Z" fill="#fde68a" opacity="0.4"/>

  <!-- Right point -->
  <path d="M40 26 L44 14 L36 20Z" fill="url(#crownBody)" filter="url(#crownShadow)"/>
  <path d="M40 25 L42 17 L38 20Z" fill="#fde68a" opacity="0.4"/>

  <!-- Left jewel -->
  <circle cx="16" cy="24" r="2.5" fill="url(#crownJewel)" filter="url(#crownGlow)"/>
  <circle cx="15.2" cy="23.2" r="0.8" fill="#fff" opacity="0.5"/>

  <!-- Center jewel -->
  <circle cx="24" cy="22" r="3.5" fill="url(#crownJewel)" filter="url(#crownGlow)"/>
  <circle cx="23" cy="21" r="1.2" fill="#fff" opacity="0.6"/>

  <!-- Right jewel -->
  <circle cx="32" cy="24" r="2.5" fill="url(#crownJewel)" filter="url(#crownGlow)"/>
  <circle cx="31.2" cy="23.2" r="0.8" fill="#fff" opacity="0.5"/>

  <!-- Top cross -->
  <circle cx="24" cy="10" r="2" fill="#fde68a" filter="url(#crownGlow)"/>
  <circle cx="24" cy="10" r="0.8" fill="#fff" opacity="0.7"/>

  <!-- Sparkle accents -->
  <circle cx="6" cy="12" r="0.6" fill="#fef3c7" opacity="0.8"/>
  <circle cx="42" cy="12" r="0.6" fill="#fef3c7" opacity="0.8"/>
  <circle cx="24" cy="6" r="0.5" fill="#fde68a" opacity="0.9"/>
</svg>
