<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcSunBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="wcSunCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="wcSunRay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="wcSunGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcSunShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#78350f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="9" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Halo outer -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="url(#wcSunRay)" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 3"/>

  <!-- Rays (12 rays with varying lengths) -->
  <!-- Top -->
  <line x1="24" y1="2" x2="24" y2="8" stroke="url(#wcSunRay)" stroke-width="2.5" stroke-linecap="round" filter="url(#wcSunGlow)"/>
  <!-- Top-right -->
  <line x1="36" y1="6" x2="32" y2="11" stroke="url(#wcSunRay)" stroke-width="2" stroke-linecap="round" filter="url(#wcSunGlow)"/>
  <!-- Right -->
  <line x1="44" y1="18" x2="38" y2="20" stroke="url(#wcSunRay)" stroke-width="2.5" stroke-linecap="round" filter="url(#wcSunGlow)"/>
  <!-- Bottom-right -->
  <line x1="40" y1="34" x2="35" y2="30" stroke="url(#wcSunRay)" stroke-width="2" stroke-linecap="round" filter="url(#wcSunGlow)"/>
  <!-- Bottom -->
  <line x1="24" y1="40" x2="24" y2="46" stroke="url(#wcSunRay)" stroke-width="2.5" stroke-linecap="round" filter="url(#wcSunGlow)"/>
  <!-- Bottom-left -->
  <line x1="10" y1="36" x2="14" y2="31" stroke="url(#wcSunRay)" stroke-width="2" stroke-linecap="round" filter="url(#wcSunGlow)"/>
  <!-- Left -->
  <line x1="4" y1="24" x2="10" y2="24" stroke="url(#wcSunRay)" stroke-width="2.5" stroke-linecap="round" filter="url(#wcSunGlow)"/>
  <!-- Top-left -->
  <line x1="8" y1="10" x2="13" y2="14" stroke="url(#wcSunRay)" stroke-width="2" stroke-linecap="round" filter="url(#wcSunGlow)"/>
  <!-- Diagonal extra rays (shorter) -->
  <line x1="33" y1="9" x2="30" y2="13" stroke="url(#wcSunRay)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="41" y1="26" x2="37" y2="26" stroke="url(#wcSunRay)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="15" y1="39" x2="18" y2="35" stroke="url(#wcSunRay)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="7" y1="18" x2="11" y2="20" stroke="url(#wcSunRay)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Sun body shadow -->
  <circle cx="24" cy="24.5" r="10" fill="#000" opacity="0.2"/>

  <!-- Sun body -->
  <circle cx="24" cy="24" r="10" fill="url(#wcSunBase)" filter="url(#wcSunShadow)"/>

  <!-- Hexagon center -->
  <polygon points="24,17.5 29.5,20.8 29.5,27.2 24,30.5 18.5,27.2 18.5,20.8" fill="url(#wcSunCore)" filter="url(#wcSunGlow)"/>
  <polygon points="24,18.5 28.5,21.3 28.5,26.7 24,29.5 19.5,26.7 19.5,21.3" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.4"/>

  <!-- Center highlight -->
  <circle cx="22.5" cy="22.5" r="2" fill="#fff" opacity="0.4"/>
</svg>
