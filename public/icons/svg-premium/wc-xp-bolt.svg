<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Bolt outer gradient: 4 stops amber/gold -->
    <linearGradient id="wcBoltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <!-- Bolt core gradient: bright center -->
    <linearGradient id="wcBoltCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Electric arc gradient -->
    <linearGradient id="wcBoltArc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Glow for bolt -->
    <filter id="wcBoltGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow for core -->
    <filter id="wcBoltCoreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="wcBoltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.5" flood-color="#451a03" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Grounding shadow -->
  <ellipse cx="24" cy="45" rx="6" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Bolt outer (shadow layer for depth) -->
  <polygon points="28.5,4.5 10.5,26.5 21.5,26.5 19.5,44.5 38.5,20.5 27.5,20.5"
           fill="#451a03" opacity="0.35" transform="translate(0.5,0.8)"/>

  <!-- Bolt outer main -->
  <polygon points="28,4 10,26 21,26 19,44 38,20 27,20"
           fill="url(#wcBoltGrad)" filter="url(#wcBoltShadow)"/>
  <!-- Bolt outer edge highlight -->
  <polygon points="28,4.5 11,25.5 21.5,25.5 19.8,42.5 37,20.5 27.5,20.5"
           fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Bolt inner core -->
  <polygon points="27,7 14,24 23,24 21,38 35,19 26,19"
           fill="url(#wcBoltCore)" filter="url(#wcBoltGlow)"/>
  <!-- Core inner highlight -->
  <polygon points="26.5,8 15,23 22.5,23 21,36 33.5,20 26.5,20"
           fill="none" stroke="#fff" stroke-width="0.5" stroke-linejoin="round" opacity="0.4"/>

  <!-- Center white hot core -->
  <polygon points="26.5,12 18,22 22.5,22 21.5,32 30,20 25.5,20"
           fill="#fff" opacity="0.6" filter="url(#wcBoltCoreGlow)"/>

  <!-- Electric sparks / particles -->
  <circle cx="10" cy="20" r="1.1" fill="#fde68a" opacity="0.85"/>
  <circle cx="10" cy="20" r="0.4" fill="#fff" opacity="0.7"/>

  <circle cx="14" cy="14" r="0.9" fill="#fef3c7" opacity="0.9"/>
  <circle cx="14" cy="14" r="0.3" fill="#fff" opacity="0.8"/>

  <circle cx="38" cy="26" r="1.3" fill="#f59e0b" opacity="0.75"/>
  <circle cx="38" cy="26" r="0.5" fill="#fde68a" opacity="0.6"/>

  <circle cx="34" cy="32" r="0.8" fill="#fbbf24" opacity="0.85"/>
  <circle cx="34" cy="32" r="0.3" fill="#fff" opacity="0.5"/>

  <circle cx="18" cy="42" r="0.7" fill="#fde68a" opacity="0.65"/>
  <circle cx="22" cy="46" r="0.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="40" cy="18" r="0.6" fill="#fef3c7" opacity="0.6"/>

  <!-- Electric arc lines -->
  <line x1="8" y1="18" x2="5.5" y2="15.5" stroke="#fde68a" stroke-width="1" stroke-linecap="round" opacity="0.75"/>
  <line x1="5.5" y1="15.5" x2="4" y2="17" stroke="#fde68a" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>

  <line x1="40" y1="28" x2="42.5" y2="30.5" stroke="#f59e0b" stroke-width="1" stroke-linecap="round" opacity="0.65"/>
  <line x1="42.5" y1="30.5" x2="44" y2="29" stroke="#f59e0b" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>

  <line x1="16" y1="44" x2="13.5" y2="46.5" stroke="#fbbf24" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="13.5" y1="46.5" x2="12" y2="45" stroke="#fbbf24" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Small arc branches -->
  <line x1="20" y1="10" x2="18" y2="7" stroke="#fef3c7" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="24" x2="39" y2="22" stroke="#f59e0b" stroke-width="0.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="16" y1="38" x2="14" y2="40" stroke="#fbbf24" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>
</svg>
