<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcActBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="70%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="wcActLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="wcActHeart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <filter id="wcActGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcActShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#450a0a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Base plate shadow -->
  <rect x="5" y="8.5" width="38" height="32" rx="3" fill="#000" opacity="0.2"/>

  <!-- Base plate -->
  <rect x="5" y="8" width="38" height="32" rx="3" fill="url(#wcActBase)" filter="url(#wcActShadow)"/>
  <rect x="5.5" y="8.5" width="37" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.4"/>

  <!-- EKG line -->
  <path d="M7 26 L12 26 L14 18 L17 34 L20 20 L23 30 L26 14 L29 26 L34 26 L37 20 L39 26 L41 26" fill="none" stroke="url(#wcActLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#wcActGlow)"/>

  <!-- Heart at the peak -->
  <path d="M23 12 C23 10 25 9 26 11 C27 9 29 10 29 12 C29 14 26 16 26 16 C26 16 23 14 23 12Z" fill="url(#wcActHeart)" filter="url(#wcActGlow)"/>
  <circle cx="25" cy="11.5" r="0.6" fill="#fff" opacity="0.5"/>

  <!-- Grid lines -->
  <line x1="5" y1="18" x2="43" y2="18" stroke="rgba(255,255,255,0.06)" stroke-width="0.4" stroke-dasharray="2 3"/>
  <line x1="5" y1="34" x2="43" y2="34" stroke="rgba(255,255,255,0.06)" stroke-width="0.4" stroke-dasharray="2 3"/>
</svg>
