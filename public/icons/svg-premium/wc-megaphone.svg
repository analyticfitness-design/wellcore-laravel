<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="megaBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="megaCone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="megaHandle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="50%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="megaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="megaShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#4c1d95" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Handle -->
  <rect x="4" y="20" width="8" height="14" rx="3" fill="url(#megaHandle)" filter="url(#megaShadow)"/>
  <rect x="5" y="22" width="6" height="10" rx="2" fill="none" stroke="#4b5563" stroke-width="0.5"/>

  <!-- Megaphone cone body -->
  <path d="M12 14 L36 4 L36 44 L12 34Z" fill="url(#megaBody)" filter="url(#megaShadow)" stroke="#c4b5fd" stroke-width="0.6"/>
  
  <!-- Inner cone highlight -->
  <path d="M14 16 L33 7 L33 41 L14 32Z" fill="url(#megaCone)" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Front rim -->
  <ellipse cx="36" cy="24" rx="4" ry="20" fill="none" stroke="#c4b5fd" stroke-width="1.5" filter="url(#megaShadow)"/>
  <ellipse cx="36" cy="24" rx="3" ry="18" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Sound waves -->
  <path d="M42 12 Q48 24, 42 36" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M44 8 Q52 24, 44 40" fill="none" stroke="#c4b5fd" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M46 4 Q56 24, 46 44" fill="none" stroke="#8b5cf6" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Center emitter dot -->
  <circle cx="36" cy="24" r="2" fill="#e9d5ff" filter="url(#megaGlow)"/>
  <circle cx="35.5" cy="23.5" r="0.8" fill="#fff" opacity="0.8"/>

  <!-- Button on handle -->
  <circle cx="8" cy="26" r="1.5" fill="#DC2626"/>
  <circle cx="7.7" cy="25.7" r="0.5" fill="#f87171"/>
</svg>
