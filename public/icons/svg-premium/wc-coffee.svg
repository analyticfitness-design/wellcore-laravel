<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcCoffeeBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="wcCoffeeSteam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="wcCoffeeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcCoffeeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#78350f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="22" cy="43" rx="9" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Saucer shadow -->
  <ellipse cx="22" cy="38.5" rx="10" ry="2.5" fill="#000" opacity="0.2"/>

  <!-- Saucer -->
  <ellipse cx="22" cy="38" rx="10" ry="2.5" fill="url(#wcCoffeeBase)" filter="url(#wcCoffeeShadow)"/>
  <ellipse cx="22" cy="37.8" rx="9" ry="2" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Cup shadow -->
  <rect x="14" y="20.5" width="16" height="18" rx="3" fill="#000" opacity="0.2"/>

  <!-- Cup body -->
  <rect x="14" y="20" width="16" height="18" rx="3" fill="url(#wcCoffeeBase)" filter="url(#wcCoffeeShadow)"/>
  <rect x="14.5" y="20.5" width="15" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Coffee liquid -->
  <ellipse cx="22" cy="21.5" rx="7" ry="2" fill="#451a03" opacity="0.6"/>
  <ellipse cx="22" cy="21.3" rx="6" ry="1.5" fill="#78350f" opacity="0.4"/>

  <!-- Handle -->
  <path d="M30 24 Q36 24 36 29 Q36 34 30 34" fill="none" stroke="url(#wcCoffeeBase)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M30 24.5 Q35 24.5 35 29 Q35 33.5 30 33.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" stroke-linecap="round"/>

  <!-- Steam -->
  <path d="M19 14 Q17 10 19 8 Q21 6 19 4" fill="none" stroke="url(#wcCoffeeSteam)" stroke-width="1" stroke-linecap="round" opacity="0.7" filter="url(#wcCoffeeGlow)"/>
  <path d="M22 15 Q24 11 22 9 Q20 7 22 5" fill="none" stroke="url(#wcCoffeeSteam)" stroke-width="1" stroke-linecap="round" opacity="0.5" filter="url(#wcCoffeeGlow)"/>
  <path d="M25 14 Q23 10 25 8 Q27 6 25 4" fill="none" stroke="url(#wcCoffeeSteam)" stroke-width="1" stroke-linecap="round" opacity="0.6" filter="url(#wcCoffeeGlow)"/>

  <!-- Coffee bean -->
  <ellipse cx="36" cy="38" rx="2.5" ry="1.5" fill="#78350f" transform="rotate(-30 36 38)"/>
  <line x1="35" y1="37" x2="37" y2="39" stroke="#451a03" stroke-width="0.4" transform="rotate(-30 36 38)"/>
</svg>
