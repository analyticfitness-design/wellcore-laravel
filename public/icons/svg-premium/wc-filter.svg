<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcFilBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="30%" stop-color="#a1a1aa"/>
      <stop offset="70%" stop-color="#71717a"/>
      <stop offset="100%" stop-color="#52525b"/>
    </linearGradient>
    <linearGradient id="wcFilDrop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="wcFilGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcFilShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="8" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Funnel shadow -->
  <path d="M8 10 L40 10 L26 26 L26 36 L22 40 L22 26 Z" fill="#000" opacity="0.2" transform="translate(0,0.8)"/>

  <!-- Funnel body -->
  <path d="M8 10 L40 10 L26 26 L26 36 L22 40 L22 26 Z" fill="url(#wcFilBase)" filter="url(#wcFilShadow)"/>
  <!-- Funnel highlight -->
  <path d="M9 11 L39 11 L26.5 25 L26.5 35.5 L22.5 38.5 L22.5 25 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- Horizontal lines (filter bars) -->
  <line x1="12" y1="14" x2="36" y2="14" stroke="#e4e4e7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="15" y1="18" x2="33" y2="18" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="30" y2="22" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Drop falling from tip -->
  <path d="M24 42 Q24 44 22 44 Q20 44 20 42 Q20 40 22 38 Q24 40 24 42Z" fill="url(#wcFilDrop)" filter="url(#wcFilGlow)"/>
  <ellipse cx="21.5" cy="41.5" rx="0.6" ry="0.8" fill="#fff" opacity="0.5"/>
</svg>
