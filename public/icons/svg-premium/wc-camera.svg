<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Camera body: 4 stops dark graphite -->
    <linearGradient id="wcCamBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="30%" stop-color="#374151"/>
      <stop offset="70%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <!-- Lens gradient: 4 stops emerald -->
    <linearGradient id="wcCamLens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="30%" stop-color="#10b981"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <!-- Inner lens glass: 4 stops -->
    <linearGradient id="wcCamGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="40%" stop-color="#34d399"/>
      <stop offset="80%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <!-- Flash gradient -->
    <linearGradient id="wcCamFlash" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <!-- Glow for lens -->
    <filter id="wcCamGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow for body -->
    <filter id="wcCamShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Camera body shadow -->
  <rect x="4" y="14.5" width="40" height="28" rx="5" fill="#000" opacity="0.3"/>

  <!-- Camera body -->
  <rect x="4" y="12" width="40" height="28" rx="5" fill="url(#wcCamBody)" filter="url(#wcCamShadow)" stroke="#4b5563" stroke-width="0.5"/>
  <!-- Body top highlight -->
  <rect x="4.5" y="12.5" width="39" height="4" rx="3" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>

  <!-- Top hump (viewfinder) shadow -->
  <path d="M16 12.5 L18 7.5 L30 7.5 L32 12.5Z" fill="#000" opacity="0.3"/>

  <!-- Top hump (viewfinder) -->
  <path d="M16 12 L18 7 L30 7 L32 12Z" fill="#1f2937" stroke="#374151" stroke-width="0.3"/>
  <!-- Hump highlight -->
  <path d="M17 11 L18.5 7.5 L29.5 7.5 L31 11" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Lens outer ring shadow -->
  <circle cx="24" cy="26.5" r="11.5" fill="#000" opacity="0.3"/>

  <!-- Lens outer ring -->
  <circle cx="24" cy="26" r="11" fill="#030712" stroke="#374151" stroke-width="1"/>
  <!-- Lens ring highlight -->
  <circle cx="24" cy="26" r="10.5" fill="none" stroke="#4b5563" stroke-width="0.4"/>
  <!-- Second ring -->
  <circle cx="24" cy="26" r="10" fill="none" stroke="#1f2937" stroke-width="0.5"/>
  <!-- Third ring detail -->
  <circle cx="24" cy="26" r="9.2" fill="none" stroke="#374151" stroke-width="0.3"/>

  <!-- Lens glass main -->
  <circle cx="24" cy="26" r="8.5" fill="url(#wcCamLens)" filter="url(#wcCamGlow)"/>
  <!-- Lens glass inner shadow -->
  <circle cx="24" cy="26" r="8" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5"/>

  <!-- Inner lens reflection -->
  <circle cx="24" cy="26" r="5" fill="url(#wcCamGlass)" opacity="0.6"/>
  <!-- Lens flare 1 -->
  <circle cx="22" cy="24" r="2.2" fill="#fff" opacity="0.25"/>
  <!-- Lens flare 2 -->
  <ellipse cx="26" cy="28" rx="1.5" ry="1" fill="#fff" opacity="0.15"/>

  <!-- Flash shadow -->
  <rect x="34" y="15.5" width="6" height="4" rx="1" fill="#000" opacity="0.25"/>

  <!-- Flash -->
  <rect x="34" y="15" width="6" height="4" rx="1" fill="url(#wcCamFlash)" opacity="0.9"/>
  <!-- Flash inner -->
  <rect x="35" y="16" width="4" height="2" rx="0.5" fill="#fff"/>
  <!-- Flash highlight -->
  <rect x="35.5" y="16.2" width="2" height="0.8" rx="0.3" fill="#fff" opacity="0.8"/>

  <!-- Red record dot outer -->
  <circle cx="10" cy="17.5" r="1.8" fill="#000" opacity="0.3"/>
  <!-- Red record dot -->
  <circle cx="10" cy="17" r="1.5" fill="#DC2626"/>
  <!-- Red dot highlight -->
  <circle cx="10" cy="17" r="1" fill="#f87171"/>
  <circle cx="9.7" cy="16.7" r="0.4" fill="#fff" opacity="0.5"/>

  <!-- Grip texture lines -->
  <line x1="6" y1="18" x2="6" y2="36" stroke="#374151" stroke-width="0.5" stroke-dasharray="1 1.2"/>
  <line x1="7.5" y1="18" x2="7.5" y2="36" stroke="#374151" stroke-width="0.5" stroke-dasharray="1 1.2"/>
  <line x1="9" y1="18" x2="9" y2="36" stroke="#374151" stroke-width="0.5" stroke-dasharray="1 1.2"/>

  <!-- Bottom accent line -->
  <line x1="4" y1="38" x2="44" y2="38" stroke="#10b981" stroke-width="0.8" opacity="0.5"/>
  <line x1="4" y1="38.5" x2="44" y2="38.5" stroke="#059669" stroke-width="0.4" opacity="0.3"/>

  <!-- Mode dial on top -->
  <rect x="8" y="10" width="5" height="2" rx="0.5" fill="#1f2937" stroke="#374151" stroke-width="0.3"/>
  <line x1="9" y1="10.5" x2="12" y2="10.5" stroke="#4b5563" stroke-width="0.3" stroke-dasharray="0.6 0.4"/>

  <!-- Shutter button -->
  <circle cx="36" cy="10.5" r="1.5" fill="#DC2626" stroke="#991b1b" stroke-width="0.3"/>
  <circle cx="35.7" cy="10.2" r="0.5" fill="#f87171" opacity="0.6"/>
</svg>
