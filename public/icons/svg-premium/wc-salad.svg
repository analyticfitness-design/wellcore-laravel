<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcSaladBowl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="30%" stop-color="#16a34a"/>
      <stop offset="70%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="wcSaladLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="wcSaladTomato" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="wcSaladShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#14532d" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="10" ry="2" fill="#000" opacity="0.25"/>

  <!-- Bowl shadow -->
  <path d="M8 22 Q8 40 24 40 Q40 40 40 22Z" fill="#000" opacity="0.2"/>

  <!-- Bowl -->
  <path d="M8 22 Q8 40 24 40 Q40 40 40 22Z" fill="url(#wcSaladBowl)" filter="url(#wcSaladShadow)"/>
  <path d="M9 22 Q9 38 24 38 Q39 38 39 22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Bowl rim -->
  <ellipse cx="24" cy="22" rx="16" ry="4" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <ellipse cx="24" cy="22" rx="15.5" ry="3.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Leaves -->
  <path d="M14 18 Q16 12 20 14 Q22 10 26 13 Q30 11 32 16 Q36 15 36 20" fill="none" stroke="url(#wcSaladLeaf)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M18 16 Q20 10 24 12 Q28 9 30 14" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Tomato -->
  <circle cx="28" cy="18" r="3" fill="url(#wcSaladTomato)"/>
  <circle cx="27.5" cy="17.5" r="1" fill="#fff" opacity="0.3"/>

  <!-- Dressing line -->
  <path d="M16 20 Q20 22 24 19 Q28 21 32 18" fill="none" stroke="#fde68a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

  <!-- Fork -->
  <line x1="36" y1="14" x2="36" y2="22" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="12" x2="35" y2="16" stroke="#d4d4d8" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="36" y1="12" x2="36" y2="16" stroke="#d4d4d8" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="37" y1="12" x2="37" y2="16" stroke="#d4d4d8" stroke-width="0.8" stroke-linecap="round"/>
</svg>
