<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="trophyBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="trophyCup" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="trophyBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="50%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <filter id="trophyGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="trophyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#92400e" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Trophy cup outer -->
  <path d="M10 8 L10 14 C10 24, 16 30, 24 30 C32 30, 38 24, 38 14 L38 8Z" fill="url(#trophyBody)" filter="url(#trophyShadow)" stroke="#fde68a" stroke-width="0.6"/>
  
  <!-- Inner cup highlight -->
  <path d="M12 10 L12 14 C12 22, 17 27, 24 27 C31 27, 36 22, 36 14 L36 10Z" fill="url(#trophyCup)" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Left handle -->
  <path d="M10 10 C4 10, 4 18, 10 20" fill="none" stroke="url(#trophyBody)" stroke-width="3" stroke-linecap="round" filter="url(#trophyShadow)"/>
  <path d="M10 11 C6 11, 6 17, 10 18" fill="none" stroke="#fde68a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Right handle -->
  <path d="M38 10 C44 10, 44 18, 38 20" fill="none" stroke="url(#trophyBody)" stroke-width="3" stroke-linecap="round" filter="url(#trophyShadow)"/>
  <path d="M38 11 C42 11, 42 17, 38 18" fill="none" stroke="#fde68a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Stem -->
  <rect x="21" y="30" width="6" height="8" rx="1" fill="url(#trophyBody)" filter="url(#trophyShadow)"/>
  <rect x="22" y="31" width="4" height="6" rx="0.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Base -->
  <rect x="14" y="38" width="20" height="5" rx="2" fill="url(#trophyBase)" filter="url(#trophyShadow)"/>
  <rect x="16" y="39" width="16" height="3" rx="1" fill="#b45309" opacity="0.5"/>
  <rect x="14" y="36" width="20" height="3" rx="1.5" fill="url(#trophyBase)" filter="url(#trophyShadow)"/>

  <!-- Star emblem on cup -->
  <polygon points="24,16 25.5,20 30,20 26.5,22.5 27.5,27 24,24.5 20.5,27 21.5,22.5 18,20 22.5,20" fill="#fff" filter="url(#trophyGlow)" opacity="0.95"/>
  <polygon points="24,17 25,20 28,20 26,22 26.5,25 24,23.5 21.5,25 22,22 20,20 23,20" fill="#fde68a" opacity="0.6"/>

  <!-- Decorative shine -->
  <path d="M14 10 Q18 14 16 18" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
</svg>
