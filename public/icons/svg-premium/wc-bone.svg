<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcBoneBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e4e4e7"/>
      <stop offset="30%" stop-color="#d4d4d8"/>
      <stop offset="70%" stop-color="#a1a1aa"/>
      <stop offset="100%" stop-color="#71717a"/>
    </linearGradient>
    <linearGradient id="wcBoneEnd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#d4d4d8"/>
    </linearGradient>
    <filter id="wcBoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="11" ry="2" fill="#000" opacity="0.2"/>

  <!-- Bone shadow -->
  <path d="M12 20 Q8 20 8 16 Q8 12 12 12 Q14 12 15 14 L33 14 Q34 12 36 12 Q40 12 40 16 Q40 20 36 20 Q34 20 33 18 L15 18 Q14 20 12 20Z" fill="#000" opacity="0.2" transform="translate(0,1) rotate(45 24 24)"/>

  <!-- Bone shaft -->
  <rect x="14" y="22" width="20" height="4" rx="2" fill="url(#wcBoneBase)" filter="url(#wcBoneShadow)" transform="rotate(45 24 24)"/>

  <!-- Left epiphysis -->
  <circle cx="12" cy="16" r="5" fill="url(#wcBoneEnd)" filter="url(#wcBoneShadow)" transform="rotate(45 24 24)"/>
  <circle cx="12" cy="16" r="4.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4" transform="rotate(45 24 24)"/>

  <!-- Right epiphysis -->
  <circle cx="36" cy="16" r="5" fill="url(#wcBoneEnd)" filter="url(#wcBoneShadow)" transform="rotate(45 24 24)"/>
  <circle cx="36" cy="16" r="4.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4" transform="rotate(45 24 24)"/>

  <!-- Pores texture -->
  <circle cx="10" cy="15" r="0.8" fill="rgba(0,0,0,0.1)" transform="rotate(45 24 24)"/>
  <circle cx="13" cy="17" r="0.6" fill="rgba(0,0,0,0.1)" transform="rotate(45 24 24)"/>
  <circle cx="11" cy="18" r="0.5" fill="rgba(0,0,0,0.1)" transform="rotate(45 24 24)"/>
  <circle cx="35" cy="15" r="0.7" fill="rgba(0,0,0,0.1)" transform="rotate(45 24 24)"/>
  <circle cx="37" cy="17" r="0.6" fill="rgba(0,0,0,0.1)" transform="rotate(45 24 24)"/>
  <circle cx="34" cy="18" r="0.5" fill="rgba(0,0,0,0.1)" transform="rotate(45 24 24)"/>

  <!-- Growth rings -->
  <ellipse cx="24" cy="24" rx="3" ry="1" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="0.4" transform="rotate(45 24 24)"/>
  <ellipse cx="24" cy="24" rx="5" ry="1.5" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="0.4" transform="rotate(45 24 24)"/>
</svg>
