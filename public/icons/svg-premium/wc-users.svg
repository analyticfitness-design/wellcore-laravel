<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcUsersBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wcUsersRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="wcUsersCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <filter id="wcUsersGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcUsersShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="12" ry="2" fill="#000" opacity="0.25"/>

  <!-- Left person shadow -->
  <ellipse cx="17" cy="40" rx="5" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Left person -->
  <circle cx="17" cy="20" r="5" fill="url(#wcUsersBase)" opacity="0.9"/>
  <path d="M11 34 Q11 28 17 28 Q23 28 23 34 L23 40 L11 40Z" fill="url(#wcUsersBase)" opacity="0.9"/>
  <!-- Left person highlight -->
  <circle cx="15.5" cy="18.5" r="2" fill="#fff" opacity="0.15"/>

  <!-- Right person shadow -->
  <ellipse cx="31" cy="40" rx="5" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Right person -->
  <circle cx="31" cy="20" r="5" fill="url(#wcUsersBase)" opacity="0.9"/>
  <path d="M25 34 Q25 28 31 28 Q37 28 37 34 L37 40 L25 40Z" fill="url(#wcUsersBase)" opacity="0.9"/>
  <!-- Right person highlight -->
  <circle cx="29.5" cy="18.5" r="2" fill="#fff" opacity="0.15"/>

  <!-- Connecting ring behind -->
  <ellipse cx="24" cy="32" rx="14" ry="4" fill="none" stroke="url(#wcUsersRing)" stroke-width="1.5" opacity="0.4"/>

  <!-- Center WellCore shield -->
  <path d="M24 24 L29 27 L29 33 C29 35 24 37 24 37 C24 37 19 35 19 33 L19 27Z" fill="url(#wcUsersCenter)" filter="url(#wcUsersGlow)"/>
  <path d="M24 25.5 L28 27.8 L28 32.5 C28 33.8 24 35.2 24 35.2 C24 35.2 20 33.8 20 32.5 L20 27.8Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <path d="M21.5 30 L23 33 L24 30.5 L25 33 L26.5 30" fill="none" stroke="#fca5a5" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="24" cy="29.5" r="0.8" fill="#fff" opacity="0.7"/>
</svg>
