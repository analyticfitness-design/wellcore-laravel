<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="waterBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="waterInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="waterHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cffafe"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="waterGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="waterShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#164e63" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Main drop shape -->
  <path d="M24 4 C28 12, 40 22, 40 32 C40 40, 33 46, 24 46 C15 46, 8 40, 8 32 C8 22, 20 12, 24 4Z" 
        fill="url(#waterBody)" filter="url(#waterShadow)"/>
  
  <!-- Inner drop highlight -->
  <path d="M24 8 C27 14, 36 23, 36 31 C36 37, 31 42, 24 42 C17 42, 12 37, 12 31 C12 23, 21 14, 24 8Z" 
        fill="url(#waterInner)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Center bright core -->
  <path d="M24 14 C26 18, 31 24, 31 30 C31 34, 28 37, 24 37 C20 37, 17 34, 17 30 C17 24, 22 18, 24 14Z" 
        fill="url(#waterHighlight)" filter="url(#waterGlow)" opacity="0.6"/>

  <!-- Surface wave line -->
  <path d="M12 32 Q18 35, 24 32 Q30 29, 36 32" fill="none" stroke="#cffafe" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M14 36 Q19 38, 24 36 Q29 34, 34 36" fill="none" stroke="#cffafe" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Big shine -->
  <ellipse cx="16" cy="24" rx="3" ry="5" fill="#fff" opacity="0.25" transform="rotate(-15 16 24)"/>
  <ellipse cx="16.5" cy="24.5" rx="1.5" ry="2.5" fill="#fff" opacity="0.4" transform="rotate(-15 16.5 24.5)"/>

  <!-- Small droplets -->
  <circle cx="8" cy="16" r="1.2" fill="#67e8f9" opacity="0.8"/>
  <circle cx="7.7" cy="15.7" r="0.4" fill="#fff" opacity="0.6"/>
  <circle cx="40" cy="18" r="0.9" fill="#22d3ee" opacity="0.7"/>
  <circle cx="10" cy="10" r="0.7" fill="#a5f3fc" opacity="0.6"/>
  <circle cx="38" cy="10" r="0.6" fill="#cffafe" opacity="0.5"/>
</svg>
