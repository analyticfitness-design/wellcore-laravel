<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcSparkBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="wcSparkCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="wcSparkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcSparkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#78350f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="7" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Main sparkle shadow -->
  <path d="M24 6 L27 19 L40 24 L27 29 L24 42 L21 29 L8 24 L21 19Z" fill="#000" opacity="0.2" transform="translate(0,1)"/>

  <!-- Main sparkle outer -->
  <path d="M24 6 L27 19 L40 24 L27 29 L24 42 L21 29 L8 24 L21 19Z" fill="url(#wcSparkBase)" filter="url(#wcSparkShadow)"/>
  <!-- Main sparkle inner highlight -->
  <path d="M24 8 L26.5 18.5 L38 24 L26.5 29.5 L24 40 L21.5 29.5 L10 24 L21.5 18.5Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Core center -->
  <circle cx="24" cy="24" r="4" fill="url(#wcSparkCore)" filter="url(#wcSparkGlow)"/>
  <circle cx="24" cy="24" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="23.5" cy="23.5" r="0.8" fill="#fff" opacity="0.9"/>

  <!-- Satellite sparkle 1 (top-right) -->
  <path d="M35 10 L36 13 L39 14 L36 15 L35 18 L34 15 L31 14 L34 13Z" fill="#fbbf24" opacity="0.8"/>
  <circle cx="35" cy="14" r="0.8" fill="#fff" opacity="0.7"/>

  <!-- Satellite sparkle 2 (bottom-left) -->
  <path d="M12 32 L13 34.5 L15.5 35.5 L13 36.5 L12 39 L11 36.5 L8.5 35.5 L11 34.5Z" fill="#fbbf24" opacity="0.6"/>
  <circle cx="12" cy="35.5" r="0.6" fill="#fff" opacity="0.5"/>

  <!-- Satellite sparkle 3 (top-left) -->
  <path d="M10 12 L10.8 14 L12.8 14.5 L10.8 15 L10 17 L9.2 15 L7.2 14.5 L9.2 14Z" fill="#fde68a" opacity="0.7"/>

  <!-- Satellite sparkle 4 (bottom-right) -->
  <path d="M38 34 L38.6 35.5 L40.1 36 L38.6 36.5 L38 38 L37.4 36.5 L35.9 36 L37.4 35.5Z" fill="#fde68a" opacity="0.5"/>
</svg>
