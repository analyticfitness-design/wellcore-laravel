<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcPlusBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="30%" stop-color="#10b981"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="wcPlusCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="wcPlusGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcPlusShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#064e3b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="9" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Outer ring shadow -->
  <circle cx="24" cy="24.5" r="18" fill="#000" opacity="0.2"/>

  <!-- Outer ring -->
  <circle cx="24" cy="24" r="18" fill="url(#wcPlusBase)" filter="url(#wcPlusShadow)"/>
  <!-- Ring bevel highlight -->
  <circle cx="24" cy="24" r="17.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <!-- Ring inner shadow -->
  <circle cx="24" cy="24" r="17.5" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.4"/>

  <!-- Inner recessed -->
  <circle cx="24" cy="24" r="14" fill="rgba(0,0,0,0.15)"/>
  <circle cx="24" cy="24" r="13.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.3"/>

  <!-- Vertical bar -->
  <rect x="21" y="12" width="6" height="24" rx="3" fill="url(#wcPlusCore)" filter="url(#wcPlusGlow)"/>
  <rect x="21.5" y="12.5" width="5" height="4" rx="2" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.3"/>

  <!-- Horizontal bar -->
  <rect x="12" y="21" width="24" height="6" rx="3" fill="url(#wcPlusCore)" filter="url(#wcPlusGlow)"/>
  <rect x="12.5" y="21.5" width="4" height="5" rx="2" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.3"/>

  <!-- Center intersection highlight -->
  <circle cx="24" cy="24" r="2.5" fill="#fff" opacity="0.4" filter="url(#wcPlusGlow)"/>
  <circle cx="23.5" cy="23.5" r="1" fill="#fff" opacity="0.7"/>
</svg>
