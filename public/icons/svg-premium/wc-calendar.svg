<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="calBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="calTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="calCheck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="calGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="calShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1e3a5f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Calendar body -->
  <rect x="4" y="10" width="40" height="36" rx="5" fill="url(#calBody)" filter="url(#calShadow)"/>
  <rect x="6" y="12" width="36" height="32" rx="4" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Calendar top header -->
  <rect x="4" y="10" width="40" height="12" rx="5" fill="url(#calTop)" filter="url(#calShadow)"/>
  <rect x="4" y="18" width="40" height="4" fill="url(#calTop)"/>

  <!-- Rings / hooks -->
  <rect x="12" y="4" width="4" height="10" rx="2" fill="#1e3a5f" filter="url(#calShadow)"/>
  <rect x="13" y="5" width="2" height="8" rx="1" fill="#60a5fa" opacity="0.5"/>
  <rect x="32" y="4" width="4" height="10" rx="2" fill="#1e3a5f" filter="url(#calShadow)"/>
  <rect x="33" y="5" width="2" height="8" rx="1" fill="#60a5fa" opacity="0.5"/>

  <!-- Grid lines -->
  <line x1="4" y1="24" x2="44" y2="24" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="4" y1="32" x2="44" y2="32" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="16" y1="22" x2="16" y2="46" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="28" y1="22" x2="28" y2="46" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <line x1="40" y1="22" x2="40" y2="46" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

  <!-- Date dots -->
  <circle cx="10" cy="28" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="22" cy="28" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="34" cy="28" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="10" cy="36" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="22" cy="36" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="34" cy="36" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="10" cy="44" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="22" cy="44" r="1" fill="rgba(255,255,255,0.4)"/>

  <!-- Big checkmark on active date -->
  <circle cx="34" cy="40" r="5" fill="url(#calCheck)" filter="url(#calGlow)"/>
  <path d="M31.5 40 L33.5 42.5 L37 38" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
