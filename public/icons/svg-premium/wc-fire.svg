<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="fireOuter" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="fireMid" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="fireCore" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="fireGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#7f1d1d" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer flame shape -->
  <path d="M24 4 C30 12, 38 18, 38 30 C38 40, 31 44, 24 44 C17 44, 10 40, 10 30 
           C10 22, 16 18, 19 12 C21 16, 21 20, 23 18 C26 14, 25 9, 24 4Z" 
        fill="url(#fireOuter)" filter="url(#fireShadow)"/>

  <!-- Middle flame layer -->
  <path d="M24 14 C28 18, 32 22, 32 30 C32 36, 28 39, 24 39 C20 39, 16 36, 16 30 
           C16 25, 20 23, 22 19 C23 22, 23 24, 24 23 C25 21, 24 17, 24 14Z" 
        fill="url(#fireMid)" opacity="0.85"/>

  <!-- Inner bright core -->
  <path d="M24 22 C26 25, 28 28, 28 33 C28 37, 26 39, 24 39 C22 39, 20 37, 20 33 
           C20 29, 22 28, 23 25 C24 27, 24 28, 24 27 C25 26, 24 24, 24 22Z" 
        fill="url(#fireCore)" filter="url(#fireGlow)"/>

  <!-- Hot center dot -->
  <ellipse cx="24" cy="36" rx="2" ry="3" fill="#fff" opacity="0.85"/>

  <!-- Sparks -->
  <circle cx="16" cy="12" r="0.8" fill="#fbbf24" opacity="0.9"/>
  <circle cx="32" cy="14" r="0.6" fill="#fbbf24" opacity="0.7"/>
  <circle cx="18" cy="8" r="0.5" fill="#fef3c7" opacity="0.9"/>
  <circle cx="30" cy="10" r="0.4" fill="#fef3c7" opacity="0.8"/>
  
  <!-- Ember particles rising -->
  <circle cx="20" cy="6" r="0.3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="28" cy="4" r="0.25" fill="#f59e0b" opacity="0.5"/>
  <circle cx="24" cy="2" r="0.35" fill="#fef3c7" opacity="0.7"/>

  <!-- Flame base ring -->
  <ellipse cx="24" cy="43" rx="10" ry="2" fill="#DC2626" opacity="0.3"/>
</svg>
