<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcArrLBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wcArrLCore" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="wcArrLGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcArrLShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="22" cy="42" rx="10" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Arrow shadow -->
  <path d="M40 24 L18 24 L26 16 L24 14 L12 26 L24 38 L26 36 L18 28 L40 28Z" fill="#000" opacity="0.2" transform="translate(-0.8,0.8)"/>

  <!-- Arrow body -->
  <path d="M40 22 L16 22 L24 14 L22 12 L8 26 L22 40 L24 38 L16 30 L40 30Z" fill="url(#wcArrLBase)" filter="url(#wcArrLShadow)"/>

  <!-- Arrow highlight edge -->
  <path d="M39 22.5 L17 22.5 L24 15 L22 13 L9 26 L22 39 L24 37 L17 29.5 L39 29.5Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- Inner core highlight -->
  <path d="M36 24 L18 24 L24 18 L23 17 L13 26 L23 35 L24 34 L18 28 L36 28Z" fill="url(#wcArrLCore)" opacity="0.5"/>

  <!-- Tip glow -->
  <circle cx="10" cy="26" r="2" fill="#93c5fd" filter="url(#wcArrLGlow)" opacity="0.7"/>

  <!-- Trail lines -->
  <line x1="44" y1="24" x2="40" y2="24" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="45" y1="26" x2="41" y2="26" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
</svg>
