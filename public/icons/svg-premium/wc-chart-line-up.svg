<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcCliBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="30%" stop-color="#10b981"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="wcCliLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="wcCliArea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="wcCliGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcCliShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#064e3b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Base shadow -->
  <rect x="5" y="8.5" width="38" height="32" rx="3" fill="#000" opacity="0.2"/>

  <!-- Base -->
  <rect x="5" y="8" width="38" height="32" rx="3" fill="url(#wcCliBase)" filter="url(#wcCliShadow)"/>
  <rect x="5.5" y="8.5" width="37" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.4"/>

  <!-- Chart inner area -->
  <rect x="9" y="12" width="30" height="24" rx="2" fill="#0f172a" opacity="0.4"/>

  <!-- Area under curve -->
  <path d="M10 34 L14 28 L20 30 L26 20 L32 16 L38 12 L38 34 L10 34Z" fill="url(#wcCliArea)"/>

  <!-- Trend line -->
  <path d="M10 34 L14 28 L20 30 L26 20 L32 16 L38 12" fill="none" stroke="url(#wcCliLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#wcCliGlow)"/>

  <!-- Data points -->
  <circle cx="14" cy="28" r="2.2" fill="#34d399" filter="url(#wcCliGlow)"/>
  <circle cx="20" cy="30" r="2.2" fill="#34d399" filter="url(#wcCliGlow)"/>
  <circle cx="26" cy="20" r="2.5" fill="#6ee7b7" filter="url(#wcCliGlow)"/>
  <circle cx="32" cy="16" r="2.8" fill="#a7f3d0" filter="url(#wcCliGlow)"/>

  <!-- Point highlights -->
  <circle cx="14" cy="27.7" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="26" cy="19.7" r="0.9" fill="#fff" opacity="0.7"/>
  <circle cx="32" cy="15.7" r="1" fill="#fff" opacity="0.8"/>

  <!-- Arrow tip at end -->
  <path d="M36 10 L38 12 L36 14" fill="none" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Grid lines -->
  <line x1="9" y1="20" x2="39" y2="20" stroke="rgba(255,255,255,0.06)" stroke-width="0.4" stroke-dasharray="2 3"/>
  <line x1="9" y1="28" x2="39" y2="28" stroke="rgba(255,255,255,0.06)" stroke-width="0.4" stroke-dasharray="2 3"/>
</svg>
