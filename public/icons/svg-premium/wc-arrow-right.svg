<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcArrRBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wcArrRCore" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="wcArrRGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcArrRShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="26" cy="42" rx="10" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Arrow shadow -->
  <path d="M8 24 L30 24 L22 16 L24 14 L36 26 L24 38 L22 36 L30 28 L8 28Z" fill="#000" opacity="0.2" transform="translate(0.8,0.8)"/>

  <!-- Arrow body -->
  <path d="M8 22 L32 22 L24 14 L26 12 L40 26 L26 40 L24 38 L32 30 L8 30Z" fill="url(#wcArrRBase)" filter="url(#wcArrRShadow)"/>

  <!-- Arrow highlight edge -->
  <path d="M9 22.5 L31 22.5 L24 15 L26 13 L39 26 L26 39 L24 37 L31 29.5 L9 29.5Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- Inner core highlight -->
  <path d="M12 24 L30 24 L24 18 L25 17 L35 26 L25 35 L24 34 L30 28 L12 28Z" fill="url(#wcArrRCore)" opacity="0.5"/>

  <!-- Tip glow -->
  <circle cx="38" cy="26" r="2" fill="#93c5fd" filter="url(#wcArrRGlow)" opacity="0.7"/>

  <!-- Trail lines -->
  <line x1="4" y1="24" x2="8" y2="24" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="3" y1="26" x2="7" y2="26" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
</svg>
