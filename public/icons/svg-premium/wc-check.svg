<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Outer circle gradient: 4 stops emerald -->
    <linearGradient id="wcChkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="30%" stop-color="#10b981"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <!-- Inner circle gradient -->
    <linearGradient id="wcChkInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <!-- Check glow -->
    <filter id="wcChkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="wcChkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#064e3b" flood-opacity="0.45"/>
    </filter>
    <!-- Subtle inner glow for bevel -->
    <filter id="wcChkBevel" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle shadow -->
  <circle cx="24" cy="25.5" r="20" fill="#000" opacity="0.25"/>

  <!-- Outer circle main -->
  <circle cx="24" cy="24" r="20" fill="url(#wcChkGrad)" filter="url(#wcChkShadow)" stroke="#6ee7b7" stroke-width="0.7"/>
  <!-- Outer circle top highlight -->
  <circle cx="24" cy="24" r="19.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>
  <!-- Outer circle bottom shadow -->
  <circle cx="24" cy="24" r="19.5" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="0.4" transform="rotate(180 24 24)"/>

  <!-- Inner circle -->
  <circle cx="24" cy="24" r="16" fill="url(#wcChkInner)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <!-- Inner recessed shadow -->
  <circle cx="24" cy="24" r="15.5" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.4"/>

  <!-- Check mark outer shadow for 3D -->
  <path d="M14 25.5 L20 31.5 L34 17.5" fill="none" stroke="#064e3b" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- Check mark main -->
  <path d="M14 25 L20 31 L34 17" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#wcChkGlow)"/>

  <!-- Check mark inner highlight -->
  <path d="M14 24.5 L20 30.5 L34 16.5" fill="none" stroke="#d1fae5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Decorative dashed ring -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Corner sparkle accents -->
  <circle cx="8" cy="14" r="0.8" fill="#6ee7b7" opacity="0.6"/>
  <circle cx="38" cy="12" r="0.6" fill="#34d399" opacity="0.5"/>
  <circle cx="40" cy="34" r="0.5" fill="#10b981" opacity="0.4"/>
</svg>
