<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcFlaskGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a1a1aa"/>
      <stop offset="30%" stop-color="#71717a"/>
      <stop offset="70%" stop-color="#52525b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="wcFlaskLiquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="wcFlaskBubble" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="wcFlaskGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcFlaskShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="8" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Flask shadow -->
  <path d="M18 8 L18 18 L10 36 Q10 40 14 40 L34 40 Q38 40 38 36 L30 18 L30 8Z" fill="#000" opacity="0.2" transform="translate(0,0.8)"/>

  <!-- Flask body -->
  <path d="M18 8 L18 18 L10 36 Q10 40 14 40 L34 40 Q38 40 38 36 L30 18 L30 8Z" fill="url(#wcFlaskGlass)" filter="url(#wcFlaskShadow)"/>
  <!-- Flask highlight -->
  <path d="M19 9 L19 17.5 L11.5 35.5 Q11.5 38.5 14.5 38.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Liquid inside -->
  <path d="M13 34 L19 20 L29 20 L35 34 Q35 37 32 37 L16 37 Q13 37 13 34Z" fill="url(#wcFlaskLiquid)" opacity="0.85"/>

  <!-- Bubbles -->
  <circle cx="20" cy="32" r="1.2" fill="url(#wcFlaskBubble)" filter="url(#wcFlaskGlow)"/>
  <circle cx="24" cy="28" r="1.5" fill="url(#wcFlaskBubble)" filter="url(#wcFlaskGlow)"/>
  <circle cx="28" cy="33" r="0.9" fill="url(#wcFlaskBubble)" filter="url(#wcFlaskGlow)"/>
  <circle cx="22" cy="25" r="0.7" fill="url(#wcFlaskBubble)" opacity="0.7"/>
  <circle cx="26" cy="30" r="0.6" fill="url(#wcFlaskBubble)" opacity="0.6"/>

  <!-- Neck scale lines -->
  <line x1="20" y1="10" x2="28" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>
  <line x1="20" y1="12" x2="28" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.3"/>
  <line x1="20" y1="14" x2="28" y2="14" stroke="rgba(255,255,255,0.15)" stroke-width="0.3"/>
  <line x1="20" y1="16" x2="28" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>
</svg>
