<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcDownBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="30%" stop-color="#10b981"/>
      <stop offset="70%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="wcDownArrow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="wcDownGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcDownShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#064e3b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Tray shadow -->
  <rect x="7" y="34.5" width="34" height="7" rx="2" fill="#000" opacity="0.2"/>

  <!-- Tray -->
  <rect x="7" y="34" width="34" height="7" rx="2" fill="url(#wcDownBase)" filter="url(#wcDownShadow)"/>
  <rect x="7.5" y="34.5" width="33" height="2" rx="1" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Tray inner depth -->
  <rect x="9" y="36" width="30" height="4" rx="1" fill="rgba(0,0,0,0.15)"/>

  <!-- Arrow shadow -->
  <path d="M24 6 L30 18 L26 18 L26 30 L22 30 L22 18 L18 18Z" fill="#000" opacity="0.2" transform="translate(0,0.5)"/>

  <!-- Arrow body -->
  <path d="M24 6 L30 18 L26 18 L26 30 L22 30 L22 18 L18 18Z" fill="url(#wcDownArrow)" filter="url(#wcDownShadow)"/>
  <!-- Arrow highlight -->
  <path d="M24 7.5 L28.5 17 L25.2 17 L25.2 28.5 L22.8 28.5 L22.8 17 L19.5 17Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- Data particles falling with arrow -->
  <circle cx="20" cy="22" r="0.8" fill="#6ee7b7" opacity="0.6"/>
  <circle cx="28" cy="25" r="0.6" fill="#34d399" opacity="0.5"/>
  <circle cx="18" cy="28" r="0.5" fill="#a7f3d0" opacity="0.4"/>
  <circle cx="30" cy="20" r="0.5" fill="#6ee7b7" opacity="0.45"/>
</svg>
