<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcHomeBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wcHomeRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="wcHomeDoor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <filter id="wcHomeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcHomeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="12" ry="2" fill="#000" opacity="0.25"/>

  <!-- Roof shadow -->
  <path d="M24 5 L40 20 L40 22 L24 7 L8 22 L8 20Z" fill="#000" opacity="0.2"/>

  <!-- Roof -->
  <path d="M24 4 L42 21 L38 21 L24 8 L10 21 L6 21Z" fill="url(#wcHomeRoof)" filter="url(#wcHomeShadow)"/>
  <!-- Roof highlight -->
  <path d="M24 5.5 L39 20 L37 20 L24 8.5 L11 20 L9 20Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- House body shadow -->
  <rect x="11" y="21.5" width="26" height="20" rx="2" fill="#000" opacity="0.2"/>

  <!-- House body -->
  <rect x="11" y="21" width="26" height="20" rx="2" fill="url(#wcHomeBase)" filter="url(#wcHomeShadow)"/>
  <!-- Body bevel highlight -->
  <rect x="11.5" y="21.5" width="25" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Inner recessed panel (WellCore shield shape) -->
  <path d="M16 26 L24 24 L32 26 L32 36 C32 38 24 40 24 40 C24 40 16 38 16 36Z" fill="rgba(0,0,0,0.15)"/>
  <path d="M16.5 26.5 L24 24.5 L31.5 26.5 L31.5 35.5 C31.5 37.2 24 39 24 39 C24 39 16.5 37.2 16.5 35.5Z" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>

  <!-- Door -->
  <rect x="20.5" y="32" width="7" height="9" rx="1" fill="url(#wcHomeDoor)"/>
  <rect x="21" y="32.5" width="6" height="8" rx="0.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>
  <!-- Door handle -->
  <circle cx="26" cy="36.5" r="0.8" fill="#60a5fa" filter="url(#wcHomeGlow)"/>

  <!-- Window left -->
  <rect x="13.5" y="26" width="5" height="5" rx="1" fill="rgba(147,197,253,0.3)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <line x1="16" y1="26" x2="16" y2="31" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>
  <line x1="13.5" y1="28.5" x2="18.5" y2="28.5" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Window right -->
  <rect x="29.5" y="26" width="5" height="5" rx="1" fill="rgba(147,197,253,0.3)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <line x1="32" y1="26" x2="32" y2="31" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>
  <line x1="29.5" y1="28.5" x2="34.5" y2="28.5" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Roof peak accent -->
  <circle cx="24" cy="6.5" r="1" fill="#93c5fd" filter="url(#wcHomeGlow)" opacity="0.8"/>
</svg>
