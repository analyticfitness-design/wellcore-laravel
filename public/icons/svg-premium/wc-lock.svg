<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcLockBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="wcLockShackle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="wcLockGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcLockShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#78350f" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="9" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Shackle shadow -->
  <path d="M16 24 L16 16 Q16 8 24 8 Q32 8 32 16 L32 24" fill="none" stroke="#000" stroke-width="6" stroke-linecap="round" opacity="0.2"/>

  <!-- Shackle -->
  <path d="M16 24 L16 16 Q16 8 24 8 Q32 8 32 16 L32 24" fill="none" stroke="url(#wcLockShackle)" stroke-width="5" stroke-linecap="round" filter="url(#wcLockShadow)"/>
  <path d="M16 23.5 L16 16 Q16 8.5 24 8.5 Q32 8.5 32 16 L32 23.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Body shadow -->
  <rect x="10" y="22.5" width="28" height="18" rx="4" fill="#000" opacity="0.2"/>

  <!-- Body -->
  <rect x="10" y="22" width="28" height="18" rx="4" fill="url(#wcLockBase)" filter="url(#wcLockShadow)"/>
  <rect x="10.5" y="22.5" width="27" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Keyhole -->
  <circle cx="24" cy="29" r="3.5" fill="#78350f" opacity="0.5"/>
  <circle cx="24" cy="29" r="2.5" fill="#451a03"/>
  <rect x="23" y="29" width="2" height="5" rx="1" fill="#451a03"/>
  <circle cx="24" cy="28.5" r="1" fill="#fff" opacity="0.3"/>

  <!-- WellCore shield emblem on body -->
  <path d="M24 34 L26 35.5 L26 37 C26 37.8 24 38.5 24 38.5 C24 38.5 22 37.8 22 37 L22 35.5Z" fill="#DC2626" opacity="0.6"/>
</svg>
