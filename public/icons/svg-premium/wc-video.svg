<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcVidBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="70%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="wcVidScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="wcVidWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="wcVidGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcVidShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#450a0a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="12" ry="2" fill="#000" opacity="0.25"/>

  <!-- Body shadow -->
  <rect x="6" y="11.5" width="36" height="26" rx="4" fill="#000" opacity="0.2"/>

  <!-- Camera body -->
  <rect x="6" y="11" width="36" height="26" rx="4" fill="url(#wcVidBody)" filter="url(#wcVidShadow)"/>
  <!-- Body highlight -->
  <rect x="6.5" y="11.5" width="35" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Screen -->
  <rect x="9" y="15" width="30" height="18" rx="2" fill="url(#wcVidScreen)" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Sound waves on screen -->
  <path d="M13 24 Q15 20 17 24 Q19 28 21 24" fill="none" stroke="url(#wcVidWave)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <path d="M23 24 Q25 18 27 24 Q29 30 31 24" fill="none" stroke="url(#wcVidWave)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M33 24 Q34 21 35 24 Q36 27 37 24" fill="none" stroke="url(#wcVidWave)" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- Record button -->
  <circle cx="38" cy="14.5" r="2.2" fill="#DC2626" stroke="#fca5a5" stroke-width="0.4" filter="url(#wcVidGlow)"/>
  <circle cx="38" cy="14.5" r="1.2" fill="#f87171"/>
  <circle cx="37.7" cy="14.2" r="0.4" fill="#fff" opacity="0.6"/>

  <!-- Viewfinder hump -->
  <path d="M18 11 L20 7 L28 7 L30 11Z" fill="#7f1d1d" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>
  <path d="M19 10.5 L20.5 7.5 L27.5 7.5 L29 10.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Bottom accent line -->
  <line x1="6" y1="38" x2="42" y2="38" stroke="#f87171" stroke-width="0.8" opacity="0.5"/>
</svg>
