<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcXBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="70%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="wcXCore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="wcXGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcXShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#450a0a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="9" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Outer ring shadow -->
  <circle cx="24" cy="24.5" r="18" fill="#000" opacity="0.2"/>

  <!-- Outer ring -->
  <circle cx="24" cy="24" r="18" fill="url(#wcXBase)" filter="url(#wcXShadow)"/>
  <!-- Ring bevel highlight -->
  <circle cx="24" cy="24" r="17.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Inner recessed -->
  <circle cx="24" cy="24" r="14" fill="rgba(0,0,0,0.15)"/>

  <!-- X arm 1 shadow -->
  <path d="M16 16 L18 14 L32 28 L30 30Z" fill="#450a0a" opacity="0.4" transform="translate(0,0.5)"/>

  <!-- X arm 1 -->
  <path d="M16 16 L32 32" fill="none" stroke="url(#wcXCore)" stroke-width="5" stroke-linecap="round" filter="url(#wcXGlow)"/>
  <path d="M16 16 L32 32" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- X arm 2 shadow -->
  <path d="M32 16 L30 14 L16 28 L18 30Z" fill="#450a0a" opacity="0.4" transform="translate(0,0.5)"/>

  <!-- X arm 2 -->
  <path d="M32 16 L16 32" fill="none" stroke="url(#wcXCore)" stroke-width="5" stroke-linecap="round" filter="url(#wcXGlow)"/>
  <path d="M32 16 L16 32" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Impact lines -->
  <line x1="10" y1="10" x2="12" y2="12" stroke="#fca5a5" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="38" y1="10" x2="36" y2="12" stroke="#fca5a5" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="38" x2="12" y2="36" stroke="#fca5a5" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="38" y1="38" x2="36" y2="36" stroke="#fca5a5" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
