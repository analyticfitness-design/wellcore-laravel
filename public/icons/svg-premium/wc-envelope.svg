<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcEnvBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="30%" stop-color="#d1d5db"/>
      <stop offset="70%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <linearGradient id="wcEnvFlap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
    <linearGradient id="wcEnvSeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="wcEnvShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="42" rx="11" ry="2" fill="#000" opacity="0.2"/>

  <!-- Envelope shadow -->
  <rect x="5" y="12.5" width="38" height="26" rx="3" fill="#000" opacity="0.2"/>

  <!-- Envelope body -->
  <rect x="5" y="12" width="38" height="26" rx="3" fill="url(#wcEnvBase)" filter="url(#wcEnvShadow)"/>

  <!-- Envelope flap (V shape) -->
  <path d="M5 14 L24 28 L43 14" fill="url(#wcEnvFlap)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <path d="M5 14 L24 28 L43 14" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>

  <!-- Bottom flap hint -->
  <path d="M5 36 L24 24 L43 36" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>

  <!-- Wax seal -->
  <circle cx="24" cy="26" r="5" fill="url(#wcEnvSeal)" filter="url(#wcEnvShadow)"/>
  <circle cx="24" cy="26" r="4.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>
  <!-- W on seal -->
  <path d="M21.5 24.5 L23 28.5 L24 26.5 L25 28.5 L26.5 24.5" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
