<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcTrashBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="70%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="wcTrashInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <filter id="wcTrashGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcTrashShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#450a0a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="9" ry="1.5" fill="#000" opacity="0.25"/>

  <!-- Body shadow -->
  <rect x="13" y="16.5" width="22" height="24" rx="3" fill="#000" opacity="0.2"/>

  <!-- Body -->
  <rect x="13" y="16" width="22" height="24" rx="3" fill="url(#wcTrashBase)" filter="url(#wcTrashShadow)"/>
  <!-- Body highlight -->
  <rect x="13.5" y="16.5" width="21" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.4"/>

  <!-- Vertical slits -->
  <line x1="18" y1="20" x2="18" y2="36" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="24" y2="36" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="20" x2="30" y2="36" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Lid shadow -->
  <rect x="10" y="12.5" width="28" height="5" rx="1.5" fill="#000" opacity="0.25"/>

  <!-- Lid -->
  <rect x="10" y="12" width="28" height="5" rx="1.5" fill="url(#wcTrashBase)" filter="url(#wcTrashShadow)"/>
  <rect x="10.5" y="12.5" width="27" height="2" rx="1" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.3"/>

  <!-- Lid handle -->
  <rect x="20" y="9" width="8" height="4" rx="1.5" fill="#991b1b" stroke="#7f1d1d" stroke-width="0.3"/>
  <rect x="21" y="9.5" width="6" height="1.5" rx="0.75" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Deletion particles rising from lid -->
  <circle cx="16" cy="10" r="0.8" fill="#fca5a5" opacity="0.6"/>
  <circle cx="20" cy="7" r="0.6" fill="#fca5a5" opacity="0.5"/>
  <circle cx="28" cy="8" r="0.7" fill="#fca5a5" opacity="0.55"/>
  <circle cx="32" cy="10" r="0.5" fill="#fca5a5" opacity="0.4"/>
</svg>
