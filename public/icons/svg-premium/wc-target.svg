<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="tgtOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="tgtMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="tgtInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="tgtGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tgtShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#7f1d1d" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="url(#tgtOuter)" stroke-width="3.5" filter="url(#tgtShadow)"/>
  <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>

  <!-- Middle ring -->
  <circle cx="24" cy="24" r="13" fill="none" stroke="url(#tgtMid)" stroke-width="3" filter="url(#tgtShadow)"/>
  <circle cx="24" cy="24" r="13" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Inner ring -->
  <circle cx="24" cy="24" r="6" fill="none" stroke="url(#tgtOuter)" stroke-width="2.5" filter="url(#tgtShadow)"/>

  <!-- Bullseye center -->
  <circle cx="24" cy="24" r="3" fill="url(#tgtInner)" filter="url(#tgtGlow)"/>
  <circle cx="23.2" cy="23.2" r="1" fill="#fff" opacity="0.7"/>

  <!-- Crosshair lines -->
  <line x1="24" y1="2" x2="24" y2="8" stroke="#fca5a5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="40" x2="24" y2="46" stroke="#fca5a5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="2" y1="24" x2="8" y2="24" stroke="#fca5a5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="40" y1="24" x2="46" y2="24" stroke="#fca5a5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <!-- Diagonal accent marks -->
  <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="#f87171" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="38.5" y1="9.5" x2="35" y2="13" stroke="#f87171" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="9.5" y1="38.5" x2="13" y2="35" stroke="#f87171" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="38.5" y1="38.5" x2="35" y2="35" stroke="#f87171" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Center glow dot -->
  <circle cx="24" cy="24" r="1" fill="#fff" opacity="0.9"/>
</svg>
