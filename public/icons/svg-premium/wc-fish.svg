<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcFishBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="30%" stop-color="#0ea5e9"/>
      <stop offset="70%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="wcFishFin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="wcFishGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcFishShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0c4a6e" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Fish shadow -->
  <path d="M6 24 Q6 16 14 14 L30 10 Q38 8 42 16 Q44 20 42 24 Q44 28 42 32 Q38 40 30 38 L14 34 Q6 32 6 24Z" fill="#000" opacity="0.2" transform="translate(0,0.8)"/>

  <!-- Fish body -->
  <path d="M6 24 Q6 16 14 14 L30 10 Q38 8 42 16 Q44 20 42 24 Q44 28 42 32 Q38 40 30 38 L14 34 Q6 32 6 24Z" fill="url(#wcFishBase)" filter="url(#wcFishShadow)"/>
  <path d="M7 24 Q7 17 14 15 L30 11 Q37 9 41 16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Dorsal fin -->
  <path d="M20 12 L26 6 L32 10Z" fill="url(#wcFishFin)" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Tail fin -->
  <path d="M40 18 L46 12 L46 24 L46 36 L40 30Z" fill="url(#wcFishFin)" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Eye -->
  <circle cx="12" cy="20" r="2.5" fill="#fff"/>
  <circle cx="12" cy="20" r="1.5" fill="#0c4a6e"/>
  <circle cx="11.5" cy="19.5" r="0.5" fill="#fff" opacity="0.7"/>

  <!-- Gills -->
  <path d="M16 18 Q18 24 16 30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M18 17 Q20 24 18 31" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" stroke-linecap="round"/>

  <!-- Waves below -->
  <path d="M8 38 Q14 35 20 38 Q26 41 32 38 Q38 35 44 38" fill="none" stroke="#38bdf8" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <path d="M10 41 Q16 38 22 41 Q28 44 34 41 Q40 38 46 41" fill="none" stroke="#0ea5e9" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
</svg>
