<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcBldBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wcBldWindow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="wcBldAwning" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="wcBldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="12" ry="2" fill="#000" opacity="0.25"/>

  <!-- Building shadow -->
  <rect x="10" y="7.5" width="28" height="34" rx="2" fill="#000" opacity="0.2"/>

  <!-- Building body -->
  <rect x="10" y="7" width="28" height="34" rx="2" fill="url(#wcBldBase)" filter="url(#wcBldShadow)"/>
  <rect x="10.5" y="7.5" width="27" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.4"/>

  <!-- Floor 1 windows -->
  <rect x="13" y="11" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>
  <rect x="21.5" y="11" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>
  <rect x="30" y="11" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>

  <!-- Floor 2 windows -->
  <rect x="13" y="19" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>
  <rect x="21.5" y="19" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>
  <rect x="30" y="19" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>

  <!-- Floor 3 windows -->
  <rect x="13" y="27" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>
  <rect x="21.5" y="27" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>
  <rect x="30" y="27" width="5" height="5" rx="0.8" fill="url(#wcBldWindow)" opacity="0.7"/>

  <!-- Entrance awning (shield shape) -->
  <path d="M16 33 L24 31 L32 33 L32 37 L24 39 L16 37Z" fill="url(#wcBldAwning)"/>
  <path d="M17 33.5 L24 31.8 L31 33.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Door -->
  <rect x="21" y="35" width="6" height="6" rx="0.5" fill="#172554"/>
  <rect x="21.5" y="35.5" width="5" height="5" rx="0.3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Flag on top -->
  <line x1="35" y1="7" x2="35" y2="3" stroke="#d4d4d8" stroke-width="1"/>
  <path d="M35 3 L41 4.5 L35 6Z" fill="#DC2626"/>
</svg>
