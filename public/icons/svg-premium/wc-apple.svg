<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="appleBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="appleInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="appleLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="50%" stop-color="#65a30d"/>
      <stop offset="100%" stop-color="#365314"/>
    </linearGradient>
    <filter id="appleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="appleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#064e3b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Apple body -->
  <path d="M24 12 C16 12, 10 18, 10 28 C10 38, 16 44, 24 44 C32 44, 38 38, 38 28 C38 18, 32 12, 24 12Z" 
        fill="url(#appleBody)" filter="url(#appleShadow)"/>
  
  <!-- Inner highlight -->
  <path d="M24 15 C18 15, 13 20, 13 28 C13 36, 18 40, 24 40 C30 40, 35 36, 35 28 C35 20, 30 15, 24 15Z" 
        fill="url(#appleInner)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Apple dimple top -->
  <path d="M20 12 Q24 10 28 12" fill="none" stroke="#047857" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Leaf -->
  <path d="M24 12 Q32 4 36 8 Q32 14 24 12Z" fill="url(#appleLeaf)" filter="url(#appleShadow)"/>
  <path d="M24 12 Q30 7 33 9" fill="none" stroke="#a3e635" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Stem -->
  <path d="M24 12 L24 8" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Shine highlight -->
  <path d="M16 20 C14 24, 14 30, 17 34" fill="none" stroke="#fff" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <ellipse cx="18" cy="22" rx="2" ry="3" fill="#fff" opacity="0.15" transform="rotate(-20 18 22)"/>

  <!-- Small bite detail (optional style) -->
  <circle cx="35" cy="22" r="2.5" fill="#0a0a0b" opacity="0.15"/>

  <!-- Dew drop -->
  <circle cx="30" cy="18" r="1" fill="#a7f3d0" opacity="0.7"/>
  <circle cx="29.7" cy="17.7" r="0.4" fill="#fff" opacity="0.8"/>
</svg>
