<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="shareNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shareNode2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shareCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shareGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shareShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1e3a5f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Connection lines -->
  <line x1="16" y1="14" x2="32" y2="24" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="34" x2="32" y2="24" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Line highlights -->
  <line x1="16" y1="14" x2="32" y2="24" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <line x1="16" y1="34" x2="32" y2="24" stroke="#60a5fa" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>

  <!-- Top-left node -->
  <circle cx="14" cy="12" r="6" fill="url(#shareNode)" filter="url(#shareShadow)"/>
  <circle cx="14" cy="12" r="4" fill="url(#shareNode2)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <circle cx="12.5" cy="10.5" r="1.5" fill="#fff" opacity="0.5"/>

  <!-- Bottom-left node -->
  <circle cx="14" cy="36" r="6" fill="url(#shareNode)" filter="url(#shareShadow)"/>
  <circle cx="14" cy="36" r="4" fill="url(#shareNode2)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <circle cx="12.5" cy="34.5" r="1.5" fill="#fff" opacity="0.5"/>

  <!-- Center-right node (main) -->
  <circle cx="34" cy="24" r="8" fill="url(#shareCenter)" filter="url(#shareShadow)" stroke="#fde68a" stroke-width="0.6"/>
  <circle cx="34" cy="24" r="5.5" fill="#fbbf24" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <circle cx="32" cy="22" r="2" fill="#fff" opacity="0.6"/>

  <!-- Arrow in center node -->
  <path d="M31 24 L37 24 M35 22 L37 24 L35 26" fill="none" stroke="#78350f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Particle accents -->
  <circle cx="8" cy="8" r="0.6" fill="#93c5fd" opacity="0.7"/>
  <circle cx="8" cy="40" r="0.5" fill="#93c5fd" opacity="0.6"/>
  <circle cx="42" cy="24" r="0.7" fill="#f59e0b" opacity="0.8"/>
</svg>
