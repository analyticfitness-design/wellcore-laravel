<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="rocBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="rocNose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="rocFin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="rocFlame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="rocGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rocShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1e3a5f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer flame / exhaust -->
  <path d="M24 38 C20 42, 18 46, 20 46 C22 46, 23 44, 24 44 C25 44, 26 46, 28 46 C30 46, 28 42, 24 38Z" fill="url(#rocFlame)" filter="url(#rocGlow)" opacity="0.8"/>
  <path d="M24 40 C22 43, 21 45, 22 45 C23 45, 24 44, 24 44 C24 44, 25 45, 26 45 C27 45, 26 43, 24 40Z" fill="#fbbf24" filter="url(#rocGlow)"/>

  <!-- Left fin -->
  <path d="M14 28 L8 36 L12 34 L16 32Z" fill="url(#rocFin)" filter="url(#rocShadow)"/>
  <!-- Right fin -->
  <path d="M34 28 L40 36 L36 34 L32 32Z" fill="url(#rocFin)" filter="url(#rocShadow)"/>

  <!-- Rocket body -->
  <ellipse cx="24" cy="24" rx="7" ry="16" fill="url(#rocBody)" filter="url(#rocShadow)"/>
  
  <!-- Body highlight -->
  <ellipse cx="22" cy="22" rx="3" ry="10" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

  <!-- Nose cone -->
  <path d="M17 12 C17 4, 21 2, 24 2 C27 2, 31 4, 31 12 C31 14, 28 15, 24 15 C20 15, 17 14, 17 12Z" fill="url(#rocNose)" filter="url(#rocShadow)"/>
  <path d="M19 10 C19 6, 22 4, 24 4 C26 4, 29 6, 29 10" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Center window -->
  <circle cx="24" cy="20" r="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <circle cx="23" cy="19" r="2.5" fill="#93c5fd" opacity="0.8"/>
  <circle cx="22.5" cy="18.5" r="1" fill="#fff" opacity="0.6"/>

  <!-- Decorative stripes -->
  <path d="M17.5 26 Q24 28 30.5 26" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <path d="M17.5 29 Q24 31 30.5 29" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Sparks -->
  <circle cx="18" cy="42" r="0.6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="30" cy="44" r="0.4" fill="#fbbf24" opacity="0.7"/>
  <circle cx="24" cy="46" r="0.5" fill="#fef3c7" opacity="0.9"/>
</svg>
