<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="chatBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="chatInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="chatAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="chatGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="chatShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1e3a5f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Back bubble -->
  <path d="M20 8 L42 8 C44 8, 46 10, 46 12 L46 28 C46 30, 44 32, 42 32 L34 32 L28 40 L26 32 L20 32 C18 32, 16 30, 16 28 L16 12 C16 10, 18 8, 20 8Z" 
        fill="url(#chatInner)" opacity="0.5" transform="translate(2, -2)"/>

  <!-- Main chat bubble -->
  <path d="M8 6 L36 6 C38 6, 40 8, 40 10 L40 28 C40 30, 38 32, 36 32 L28 32 L20 42 L18 32 L8 32 C6 32, 4 30, 4 28 L4 10 C4 8, 6 6, 8 6Z" 
        fill="url(#chatBody)" filter="url(#chatShadow)" stroke="#93c5fd" stroke-width="0.6"/>
  
  <!-- Inner bubble highlight -->
  <path d="M8 8 L36 8 C37 8, 38 9, 38 10 L38 28 C38 29, 37 30, 36 30 L27 30 L20 38 L19 30 L8 30 C7 30, 6 29, 6 28 L6 10 C6 9, 7 8, 8 8Z" 
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Text lines inside bubble -->
  <line x1="12" y1="16" x2="28" y2="16" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="12" y1="22" x2="22" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="12" y1="26" x2="18" y2="26" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Notification dot -->
  <circle cx="38" cy="8" r="4" fill="url(#chatAccent)" filter="url(#chatGlow)"/>
  <circle cx="38" cy="8" r="2" fill="#fff" opacity="0.8"/>

  <!-- Typing indicator dots -->
  <circle cx="30" cy="24" r="1" fill="#93c5fd" opacity="0.6"/>
  <circle cx="33" cy="24" r="1" fill="#93c5fd" opacity="0.5"/>
  <circle cx="36" cy="24" r="1" fill="#93c5fd" opacity="0.4"/>
</svg>
