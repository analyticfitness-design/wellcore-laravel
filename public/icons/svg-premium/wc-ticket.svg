<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcTickBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="wcTickInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="wcTickShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#78350f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="42" rx="11" ry="2" fill="#000" opacity="0.25"/>

  <!-- Ticket shadow -->
  <path d="M6 12 Q6 8 10 8 L38 8 Q42 8 42 12 L42 20 Q38 20 38 24 Q38 28 42 28 L42 36 Q42 40 38 40 L10 40 Q6 40 6 36 L6 28 Q10 28 10 24 Q10 20 6 20Z" fill="#000" opacity="0.2" transform="translate(0,0.8)"/>

  <!-- Ticket body -->
  <path d="M6 12 Q6 8 10 8 L38 8 Q42 8 42 12 L42 20 Q38 20 38 24 Q38 28 42 28 L42 36 Q42 40 38 40 L10 40 Q6 40 6 36 L6 28 Q10 28 10 24 Q10 20 6 20Z" fill="url(#wcTickBase)" filter="url(#wcTickShadow)"/>

  <!-- Ticket highlight -->
  <path d="M7 12 Q7 9 10 9 L38 9 Q41 9 41 12 L41 19.5 Q37.5 19.5 37.5 24 Q37.5 28.5 41 28.5 L41 36 Q41 39 38 39 L10 39 Q7 39 7 36 L7 28.5 Q10.5 28.5 10.5 24 Q10.5 19.5 7 19.5Z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Perforation line -->
  <line x1="28" y1="8" x2="28" y2="40" stroke="#78350f" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>

  <!-- Left section content -->
  <rect x="11" y="14" width="14" height="3" rx="1.5" fill="url(#wcTickInner)" opacity="0.8"/>
  <rect x="11" y="19" width="10" height="2.5" rx="1.25" fill="url(#wcTickInner)" opacity="0.5"/>
  <rect x="11" y="23" width="12" height="2.5" rx="1.25" fill="url(#wcTickInner)" opacity="0.6"/>
  <rect x="11" y="27" width="8" height="2.5" rx="1.25" fill="url(#wcTickInner)" opacity="0.4"/>
  <rect x="11" y="32" width="14" height="5" rx="1" fill="none" stroke="url(#wcTickInner)" stroke-width="0.8" opacity="0.6"/>

  <!-- Right section: barcode lines -->
  <line x1="31" y1="13" x2="31" y2="35" stroke="#78350f" stroke-width="1.5" opacity="0.6"/>
  <line x1="34" y1="13" x2="34" y2="35" stroke="#78350f" stroke-width="0.8" opacity="0.5"/>
  <line x1="36" y1="13" x2="36" y2="35" stroke="#78350f" stroke-width="2" opacity="0.7"/>
  <line x1="38" y1="13" x2="38" y2="35" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="13" x2="40" y2="35" stroke="#78350f" stroke-width="1.2" opacity="0.6"/>

  <!-- Corner notches visual -->
  <circle cx="10" cy="24" r="2.5" fill="var(--bg, #0a0a0b)"/>
  <circle cx="38" cy="24" r="2.5" fill="var(--bg, #0a0a0b)"/>
</svg>
