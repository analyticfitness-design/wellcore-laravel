<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="userBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="userInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="userRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="userGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="userShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1e3a5f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer decorative ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#userRing)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Body silhouette -->
  <path d="M24 26 C18 26, 12 30, 10 38 C9 40, 10 42, 12 42 L36 42 C38 42, 39 40, 38 38 C36 30, 30 26, 24 26Z" 
        fill="url(#userBody)" filter="url(#userShadow)"/>
  
  <!-- Body inner highlight -->
  <path d="M24 28 C19 28, 14 31, 12 38 C12 39, 12 40, 13 40 L35 40 C36 40, 36 39, 36 38 C34 31, 29 28, 24 28Z" 
        fill="url(#userInner)" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Head -->
  <circle cx="24" cy="16" r="10" fill="url(#userBody)" filter="url(#userShadow)"/>
  <circle cx="24" cy="16" r="7" fill="url(#userInner)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Face features -->
  <circle cx="21" cy="15" r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="27" cy="15" r="1.2" fill="#fff" opacity="0.9"/>
  <circle cx="21.3" cy="14.7" r="0.4" fill="#1e3a5f" opacity="0.5"/>
  <circle cx="27.3" cy="14.7" r="0.4" fill="#1e3a5f" opacity="0.5"/>
  
  <!-- Smile -->
  <path d="M20 19 Q24 22, 28 19" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Checkmark badge -->
  <circle cx="36" cy="36" r="6" fill="url(#userRing)" filter="url(#userShadow)"/>
  <circle cx="36" cy="36" r="4" fill="#fbbf24"/>
  <path d="M33.5 36 L35.5 38.5 L39 34" fill="none" stroke="#78350f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Highlight on head -->
  <ellipse cx="20" cy="10" rx="3" ry="2" fill="#fff" opacity="0.2" transform="rotate(-20 20 10)"/>
</svg>
