<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcCardBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wcCardChip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="wcCardMag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <filter id="wcCardGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcCardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="41" rx="12" ry="2" fill="#000" opacity="0.25"/>

  <!-- Card shadow -->
  <rect x="4" y="10.5" width="40" height="26" rx="4" fill="#000" opacity="0.2"/>

  <!-- Card body -->
  <rect x="4" y="10" width="40" height="26" rx="4" fill="url(#wcCardBase)" filter="url(#wcCardShadow)"/>
  <rect x="4.5" y="10.5" width="39" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.4"/>

  <!-- Magnetic stripe -->
  <rect x="4" y="14" width="40" height="5" fill="url(#wcCardMag)"/>
  <line x1="4" y1="14.5" x2="44" y2="14.5" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Chip -->
  <rect x="9" y="22" width="7" height="5" rx="1.2" fill="url(#wcCardChip)" stroke="#d97706" stroke-width="0.3"/>
  <line x1="12.5" y1="22" x2="12.5" y2="27" stroke="#92400e" stroke-width="0.3"/>
  <line x1="9" y1="24.5" x2="16" y2="24.5" stroke="#92400e" stroke-width="0.3"/>

  <!-- Card number dots -->
  <circle cx="22" cy="24.5" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="25" cy="24.5" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="28" cy="24.5" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="31" cy="24.5" r="1" fill="rgba(255,255,255,0.5)"/>

  <!-- WellCore mini logo -->
  <path d="M36 22 L37 25 L38 23 L39 25 L40 22" fill="none" stroke="#DC2626" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="38" cy="22.5" r="0.5" fill="#DC2626"/>

  <!-- Bottom line -->
  <line x1="9" y1="31" x2="20" y2="31" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
