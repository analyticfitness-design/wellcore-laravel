<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Iron/collar gradient: 4 stops -->
    <linearGradient id="wcBbellIron" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="30%" stop-color="#9ca3af"/>
      <stop offset="70%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <!-- Disc/bumper plate gradient: 4 stops red -->
    <linearGradient id="wcBbellDisc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="70%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <!-- Bar shaft gradient: 4 stops chrome -->
    <linearGradient id="wcBbellBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="25%" stop-color="#d1d5db"/>
      <stop offset="75%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <!-- Center mark gradient -->
    <linearGradient id="wcBbellCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <!-- Glow for center detail -->
    <filter id="wcBbellGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow for plates -->
    <filter id="wcBbellShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Left outer plate shadow -->
  <rect x="1.5" y="13.5" width="6" height="24" rx="1.5" fill="#000" opacity="0.25"/>

  <!-- Left outer plate -->
  <rect x="1.5" y="12" width="6" height="24" rx="1.5" fill="url(#wcBbellDisc)" filter="url(#wcBbellShadow)"/>
  <!-- Outer plate bevel highlight -->
  <rect x="2" y="12.5" width="5" height="23" rx="1.2" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>
  <!-- Outer plate inner shadow -->
  <rect x="2.5" y="13" width="4" height="22" rx="1" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.3"/>
  <!-- Outer plate center ring -->
  <rect x="3.5" y="20" width="2" height="8" rx="0.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Left inner plate shadow -->
  <rect x="8" y="15.5" width="4" height="20" rx="1" fill="#000" opacity="0.2"/>

  <!-- Left inner plate -->
  <rect x="8" y="14" width="4" height="20" rx="1" fill="url(#wcBbellDisc)" filter="url(#wcBbellShadow)"/>
  <rect x="8.3" y="14.3" width="3.4" height="19.4" rx="0.8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.3"/>

  <!-- Left collar shadow -->
  <rect x="12.5" y="17.5" width="2.5" height="16" rx="0.5" fill="#000" opacity="0.3"/>

  <!-- Left collar -->
  <rect x="12.5" y="16" width="2.5" height="16" rx="0.5" fill="url(#wcBbellIron)"/>
  <!-- Collar screw detail -->
  <line x1="13.2" y1="18" x2="13.2" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.3" stroke-dasharray="1.5 1"/>
  <line x1="14.3" y1="18" x2="14.3" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.3" stroke-dasharray="1.5 1"/>

  <!-- Bar shaft shadow -->
  <rect x="15" y="23" width="18" height="5" rx="2.5" fill="#000" opacity="0.25"/>

  <!-- Bar shaft -->
  <rect x="15" y="21.5" width="18" height="5" rx="2.5" fill="url(#wcBbellBar)" filter="url(#wcBbellShadow)"/>
  <!-- Bar highlight -->
  <rect x="15.5" y="22" width="17" height="2" rx="1" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.4"/>

  <!-- Bar knurling texture (left side) -->
  <line x1="16" y1="22.5" x2="16" y2="25.5" stroke="#6b7280" stroke-width="0.35" opacity="0.5"/>
  <line x1="16.8" y1="22.5" x2="16.8" y2="25.5" stroke="#6b7280" stroke-width="0.35" opacity="0.5"/>
  <line x1="17.6" y1="22.5" x2="17.6" y2="25.5" stroke="#6b7280" stroke-width="0.35" opacity="0.5"/>
  <line x1="18.4" y1="22.5" x2="18.4" y2="25.5" stroke="#6b7280" stroke-width="0.35" opacity="0.5"/>
  <!-- Smooth center section -->
  <!-- Bar knurling texture (right side) -->
  <line x1="29.6" y1="22.5" x2="29.6" y2="25.5" stroke="#6b7280" stroke-width="0.35" opacity="0.5"/>
  <line x1="30.4" y1="22.5" x2="30.4" y2="25.5" stroke="#6b7280" stroke-width="0.35" opacity="0.5"/>
  <line x1="31.2" y1="22.5" x2="31.2" y2="25.5" stroke="#6b7280" stroke-width="0.35" opacity="0.5"/>
  <line x1="32" y1="22.5" x2="32" y2="25.5" stroke="#6b7280" stroke-width="0.35" opacity="0.5"/>

  <!-- Right collar shadow -->
  <rect x="33" y="17.5" width="2.5" height="16" rx="0.5" fill="#000" opacity="0.3"/>

  <!-- Right collar -->
  <rect x="33" y="16" width="2.5" height="16" rx="0.5" fill="url(#wcBbellIron)"/>
  <line x1="33.7" y1="18" x2="33.7" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.3" stroke-dasharray="1.5 1"/>
  <line x1="34.8" y1="18" x2="34.8" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.3" stroke-dasharray="1.5 1"/>

  <!-- Right inner plate shadow -->
  <rect x="36" y="15.5" width="4" height="20" rx="1" fill="#000" opacity="0.2"/>

  <!-- Right inner plate -->
  <rect x="36" y="14" width="4" height="20" rx="1" fill="url(#wcBbellDisc)" filter="url(#wcBbellShadow)"/>
  <rect x="36.3" y="14.3" width="3.4" height="19.4" rx="0.8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.3"/>

  <!-- Right outer plate shadow -->
  <rect x="40.5" y="13.5" width="6" height="24" rx="1.5" fill="#000" opacity="0.25"/>

  <!-- Right outer plate -->
  <rect x="40.5" y="12" width="6" height="24" rx="1.5" fill="url(#wcBbellDisc)" filter="url(#wcBbellShadow)"/>
  <rect x="41" y="12.5" width="5" height="23" rx="1.2" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>
  <rect x="41.5" y="13" width="4" height="22" rx="1" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.3"/>
  <rect x="42.5" y="20" width="2" height="8" rx="0.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Center mark outer -->
  <circle cx="24" cy="24" r="2.5" fill="#450a0a" opacity="0.4"/>
  <!-- Center mark main -->
  <circle cx="24" cy="24" r="2" fill="url(#wcBbellCenter)" opacity="0.9" filter="url(#wcBbellGlow)"/>
  <!-- Center mark highlight -->
  <circle cx="24" cy="24" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="23.5" cy="23.5" r="0.4" fill="#fff" opacity="0.7"/>
</svg>
