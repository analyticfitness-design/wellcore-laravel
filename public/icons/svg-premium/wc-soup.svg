<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcSoupBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="30%" stop-color="#f97316"/>
      <stop offset="70%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="wcSoupLiquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="wcSoupGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcSoupShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#9a3412" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="10" ry="2" fill="#000" opacity="0.25"/>

  <!-- Bowl shadow -->
  <path d="M8 22 Q8 40 24 40 Q40 40 40 22Z" fill="#000" opacity="0.2"/>

  <!-- Bowl -->
  <path d="M8 22 Q8 40 24 40 Q40 40 40 22Z" fill="url(#wcSoupBase)" filter="url(#wcSoupShadow)"/>
  <path d="M9 22 Q9 38 24 38 Q39 38 39 22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Bowl rim -->
  <ellipse cx="24" cy="22" rx="16" ry="4" fill="none" stroke="#fb923c" stroke-width="1.5"/>
  <ellipse cx="24" cy="22" rx="15.5" ry="3.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>

  <!-- Soup liquid -->
  <ellipse cx="24" cy="22" rx="14" ry="3" fill="url(#wcSoupLiquid)" opacity="0.9"/>

  <!-- Steam -->
  <path d="M18 14 Q16 10 18 8 Q20 6 18 4" fill="none" stroke="#fdba74" stroke-width="1" stroke-linecap="round" opacity="0.6" filter="url(#wcSoupGlow)"/>
  <path d="M24 15 Q26 11 24 9 Q22 7 24 5" fill="none" stroke="#fdba74" stroke-width="1" stroke-linecap="round" opacity="0.5" filter="url(#wcSoupGlow)"/>
  <path d="M30 14 Q28 10 30 8 Q32 6 30 4" fill="none" stroke="#fdba74" stroke-width="1" stroke-linecap="round" opacity="0.55" filter="url(#wcSoupGlow)"/>

  <!-- Spoon -->
  <line x1="38" y1="14" x2="30" y2="24" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="29" cy="25" rx="3" ry="1.5" fill="#e4e4e7" transform="rotate(-45 29 25)"/>

  <!-- Ingredients floating -->
  <circle cx="20" cy="22" r="1.2" fill="#22c55e" opacity="0.7"/>
  <circle cx="28" cy="23" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="24" cy="21" r="0.8" fill="#facc15" opacity="0.6"/>
</svg>
