<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="wcEditBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="wcEditTip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="50%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="wcEditEraser" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="wcEditGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wcEditShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#78350f" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="43" rx="10" ry="1.5" fill="#000" opacity="0.2"/>

  <!-- Pencil shadow -->
  <rect x="20" y="6.5" width="8" height="36" rx="4" fill="#000" opacity="0.2" transform="rotate(45 24 24)"/>

  <!-- Pencil body -->
  <rect x="20" y="6" width="8" height="36" rx="4" fill="url(#wcEditBody)" filter="url(#wcEditShadow)" transform="rotate(45 24 24)"/>
  <!-- Body highlight -->
  <rect x="20.5" y="6.5" width="7" height="4" rx="2" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.3" transform="rotate(45 24 24)"/>

  <!-- Hexagonal body edges hint -->
  <line x1="22" y1="6" x2="22" y2="42" stroke="rgba(255,255,255,0.1)" stroke-width="0.4" transform="rotate(45 24 24)"/>
  <line x1="26" y1="6" x2="26" y2="42" stroke="rgba(0,0,0,0.1)" stroke-width="0.4" transform="rotate(45 24 24)"/>

  <!-- Diamond tip -->
  <polygon points="24,4 27,8 24,12 21,8" fill="url(#wcEditTip)" filter="url(#wcEditGlow)" transform="rotate(45 24 24)"/>
  <polygon points="24,5.5 25.5,8 24,10.5 22.5,8" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.3" transform="rotate(45 24 24)"/>

  <!-- Stroke lines from tip -->
  <line x1="8" y1="14" x2="12" y2="18" stroke="#fde68a" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="18" x2="10" y2="22" stroke="#fbbf24" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>

  <!-- Eraser -->
  <rect x="20" y="38" width="8" height="6" rx="2" fill="url(#wcEditEraser)" transform="rotate(45 24 24)"/>
  <rect x="20.5" y="38.5" width="7" height="2" rx="1" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.3" transform="rotate(45 24 24)"/>
</svg>
