<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="starBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="starInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="starCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#92400e" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer star -->
  <polygon points="24,2 30,16 46,18 34,28 38,44 24,36 10,44 14,28 2,18 18,16" 
           fill="url(#starBody)" filter="url(#starShadow)" stroke="#fde68a" stroke-width="0.7"/>

  <!-- Inner star -->
  <polygon points="24,8 28,18 40,20 31,27 34,38 24,32 14,38 17,27 8,20 20,18" 
           fill="url(#starInner)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

  <!-- Center star core -->
  <polygon points="24,14 26,20 32,20 27,24 29,30 24,26 19,30 21,24 16,20 22,20" 
           fill="url(#starCenter)" filter="url(#starGlow)"/>

  <!-- Center bright dot -->
  <circle cx="24" cy="23" r="1.5" fill="#fff" opacity="0.8"/>

  <!-- Rays / sparkle lines -->
  <line x1="24" y1="2" x2="24" y2="6" stroke="#fde68a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="46" y1="18" x2="42" y2="19" stroke="#fde68a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="38" y1="44" x2="35" y2="40" stroke="#fde68a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="44" x2="13" y2="40" stroke="#fde68a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="2" y1="18" x2="6" y2="19" stroke="#fde68a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

  <!-- Small sparkle orbs -->
  <circle cx="24" cy="2" r="0.8" fill="#fef3c7" filter="url(#starGlow)"/>
  <circle cx="46" cy="18" r="0.6" fill="#fde68a" opacity="0.8"/>
  <circle cx="38" cy="44" r="0.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="10" cy="44" r="0.6" fill="#fbbf24" opacity="0.7"/>
  <circle cx="2" cy="18" r="0.5" fill="#fde68a" opacity="0.8"/>
  <circle cx="24" cy="48" r="0.4" fill="#fef3c7" opacity="0.5"/>
</svg>
