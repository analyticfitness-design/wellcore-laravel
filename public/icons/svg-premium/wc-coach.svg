<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Coach face/torso gradient: 4 stops blue -->
    <linearGradient id="wcCoachGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="70%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <!-- Cap gradient: 4 stops dark navy -->
    <linearGradient id="wcCoachCap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="40%" stop-color="#0f172a"/>
      <stop offset="80%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <!-- Whistle gold gradient -->
    <linearGradient id="wcCoachWhistle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <!-- Glow for face/whistle -->
    <filter id="wcCoachGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="wcCoachShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a5f" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Headset band -->
  <path d="M16 18 C16 8, 32 8, 32 18" fill="none" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Band highlight -->
  <path d="M16 17.5 C16 8.5, 32 8.5, 32 17.5" fill="none" stroke="#4b5563" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Left earcup shadow -->
  <rect x="12" y="16.5" width="5" height="8" rx="2.5" fill="#000" opacity="0.25"/>
  <!-- Left earcup -->
  <rect x="12" y="16" width="5" height="8" rx="2.5" fill="#1f2937" stroke="#374151" stroke-width="0.5"/>
  <!-- Left earcup highlight -->
  <rect x="12.5" y="16.5" width="4" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Right earcup shadow -->
  <rect x="31" y="16.5" width="5" height="8" rx="2.5" fill="#000" opacity="0.25"/>
  <!-- Right earcup -->
  <rect x="31" y="16" width="5" height="8" rx="2.5" fill="#1f2937" stroke="#374151" stroke-width="0.5"/>
  <!-- Right earcup highlight -->
  <rect x="31.5" y="16.5" width="4" height="3" rx="1.5" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.3"/>

  <!-- Head shadow -->
  <circle cx="24" cy="22.5" r="7" fill="#000" opacity="0.25"/>

  <!-- Head -->
  <circle cx="24" cy="22" r="7" fill="url(#wcCoachGrad)" filter="url(#wcCoachShadow)"/>
  <!-- Head highlight -->
  <ellipse cx="22" cy="19" rx="3" ry="2.5" fill="#fff" opacity="0.12"/>

  <!-- Cap shadow -->
  <path d="M17 19.5 Q24 12.5 31 19.5 L31 17.5 Q24 10.5 17 17.5Z" fill="#000" opacity="0.2"/>

  <!-- Cap -->
  <path d="M17 19 Q24 12 31 19 L31 17 Q24 10 17 17Z" fill="url(#wcCoachCap)"/>
  <!-- Cap visor -->
  <rect x="16" y="19" width="16" height="2.2" rx="1" fill="#020617"/>
  <!-- Cap visor highlight -->
  <rect x="17" y="19.3" width="14" height="0.6" rx="0.3" fill="rgba(255,255,255,0.1)"/>

  <!-- Face details -->
  <!-- Left eye -->
  <circle cx="22" cy="21" r="1" fill="#fff" opacity="0.9"/>
  <circle cx="22.2" cy="20.8" r="0.35" fill="#1e3a8a" opacity="0.5"/>
  <!-- Right eye -->
  <circle cx="26" cy="21" r="1" fill="#fff" opacity="0.9"/>
  <circle cx="26.2" cy="20.8" r="0.35" fill="#1e3a8a" opacity="0.5"/>
  <!-- Smile -->
  <path d="M22 24 Q24 26.2 26 24" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  <!-- Mouth highlight -->
  <path d="M22.3 24.2 Q24 26 25.7 24.2" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.3" stroke-linecap="round"/>

  <!-- Neck shadow -->
  <rect x="21" y="28.5" width="6" height="4" rx="1" fill="#000" opacity="0.2"/>

  <!-- Neck -->
  <rect x="21" y="28" width="6" height="4" rx="1" fill="url(#wcCoachGrad)"/>

  <!-- Shoulders / torso shadow -->
  <path d="M12 36.5 Q12 32.5 18 32.5 L30 32.5 Q36 32.5 36 36.5 L36 44 Q36 46 34 46 L14 46 Q12 46 12 44Z"
        fill="#000" opacity="0.25"/>

  <!-- Shoulders / torso -->
  <path d="M12 36 Q12 32 18 32 L30 32 Q36 32 36 36 L36 44 Q36 46 34 46 L14 46 Q12 46 12 44Z"
        fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
  <!-- Torso highlight -->
  <path d="M14 36 Q14 33.5 18 33.5 L30 33.5 Q34 33.5 34 36" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Whistle on lanyard shadow -->
  <circle cx="24" cy="38.5" r="2.5" fill="#000" opacity="0.25"/>

  <!-- Whistle on lanyard -->
  <circle cx="24" cy="38" r="2.5" fill="url(#wcCoachWhistle)" stroke="#d97706" stroke-width="0.5"/>
  <circle cx="24" cy="38" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="23.7" cy="37.7" r="0.4" fill="#fff" opacity="0.7"/>
  <!-- Lanyard -->
  <line x1="24" y1="35.5" x2="24" y2="32" stroke="url(#wcCoachWhistle)" stroke-width="1"/>
  <!-- Lanyard shadow -->
  <line x1="24.3" y1="35.5" x2="24.3" y2="32" stroke="#92400e" stroke-width="0.5" opacity="0.3"/>

  <!-- Mic boom shadow -->
  <path d="M16 24.5 Q12 28.5 16 30.5" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Mic boom -->
  <path d="M16 24 Q12 28 16 30" fill="none" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mic highlight -->
  <path d="M16 24.3 Q12.3 28 16 30.2" fill="none" stroke="#4b5563" stroke-width="0.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Mic tip shadow -->
  <circle cx="16" cy="30.5" r="1.5" fill="#000" opacity="0.25"/>

  <!-- Mic tip -->
  <circle cx="16" cy="30" r="1.5" fill="#1f2937"/>
  <circle cx="16" cy="30" r="0.8" fill="#374151"/>
  <circle cx="15.8" cy="29.8" r="0.3" fill="rgba(255,255,255,0.2)"/>
</svg>
