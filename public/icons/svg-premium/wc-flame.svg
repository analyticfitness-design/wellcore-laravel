<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Outer flame gradient: 4 stops fire -->
    <linearGradient id="wcFlameOuter" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#991b1b"/>
      <stop offset="30%" stop-color="#DC2626"/>
      <stop offset="65%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Middle flame gradient -->
    <linearGradient id="wcFlameMid" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Inner bright core gradient -->
    <linearGradient id="wcFlameInner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="wcFlameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Stronger glow for core -->
    <filter id="wcFlameCoreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow for grounding -->
    <filter id="wcFlameShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#450a0a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Ground shadow / ember base -->
  <ellipse cx="24" cy="43" rx="8" ry="2" fill="#000" opacity="0.3"/>

  <!-- Outer flame shape -->
  <path d="M24 6 C28 14, 34 18, 34 28 C34 38, 28 42, 24 42 C20 42, 14 38, 14 28
           C14 22, 18 18, 20 12 C21 16, 21 20, 23 18 C25 14, 24 10, 24 6Z"
        fill="url(#wcFlameOuter)" filter="url(#wcFlameShadow)"/>
  <!-- Outer flame highlight edge -->
  <path d="M24 7 C27.5 14, 33 17.5, 33 28 C33 36.5, 27.5 40.5, 24 40.5"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" stroke-linecap="round"/>

  <!-- Middle flame layer -->
  <path d="M24 15 C27 19, 30 21.5, 30 28.5 C30 34.5, 27 37.5, 24 37.5 C21 37.5, 18 34.5, 18 28.5
           C18 24.5, 21 22.5, 22 18.5 C23 21.5, 23 23.5, 24 22.5 C25 20.5, 24 17.5, 24 15Z"
        fill="url(#wcFlameMid)" opacity="0.85"/>
  <!-- Middle flame highlight -->
  <path d="M24 16 C26.5 19.5, 29 22, 29 28.5 C29 33.5, 26.5 36.5, 24 36.5"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.4" stroke-linecap="round"/>

  <!-- Inner bright core -->
  <path d="M24 21 C26 24, 27 26, 27 30.5 C27 34, 25.5 36, 24 36 C22.5 36, 21 34, 21 30.5
           C21 27.5, 23 26.5, 23 23.5 C24 25.5, 24 26.5, 24 25.5 C25 24.5, 24 22.5, 24 21Z"
        fill="url(#wcFlameInner)" filter="url(#wcFlameGlow)"/>

  <!-- Hot center dot -->
  <ellipse cx="24" cy="34" rx="2.2" ry="3.2" fill="#fff" opacity="0.7" filter="url(#wcFlameCoreGlow)"/>
  <ellipse cx="23.5" cy="33.5" rx="1" ry="1.5" fill="#fef3c7" opacity="0.9"/>

  <!-- Sparks -->
  <circle cx="18" cy="14" r="0.9" fill="#fbbf24" opacity="0.85"/>
  <circle cx="30" cy="16" r="0.7" fill="#fbbf24" opacity="0.65"/>
  <circle cx="20" cy="10" r="0.55" fill="#fef3c7" opacity="0.9"/>
  <circle cx="28" cy="12" r="0.45" fill="#fef3c7" opacity="0.75"/>
  <circle cx="16" cy="18" r="0.5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="32" cy="20" r="0.4" fill="#f59e0b" opacity="0.5"/>

  <!-- Ember particles rising -->
  <circle cx="22" cy="8" r="0.35" fill="#f59e0b" opacity="0.55"/>
  <circle cx="26" cy="6" r="0.3" fill="#f59e0b" opacity="0.45"/>
  <circle cx="20" cy="5" r="0.25" fill="#fbbf24" opacity="0.4"/>
  <circle cx="28" cy="4" r="0.2" fill="#fbbf24" opacity="0.35"/>

  <!-- Small flame tendrils -->
  <path d="M18 32 Q16 30 17 28" fill="none" stroke="#f59e0b" stroke-width="0.4" stroke-linecap="round" opacity="0.5"/>
  <path d="M30 33 Q32 31 31 29" fill="none" stroke="#f59e0b" stroke-width="0.4" stroke-linecap="round" opacity="0.4"/>
</svg>
