# =============================================================================
# Nginx reverse proxy snippet para Laravel Reverb — WellCore Production
# Instrucciones: agregar dentro del server block de wellcorefitness.com
#                en la configuracion Nginx de EasyPanel.
# Despues de agregar: nginx -s reload
# =============================================================================

# Proxy WebSocket Reverb
# Intercepta rutas /app/ y /apps/ que usa Laravel Echo / Pusher protocol
location /app/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60;
    proxy_connect_timeout 60;
    proxy_send_timeout 60;
}

# Ruta de API interna de Reverb (autenticacion de canales privados)
location /reverb/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# =============================================================================
# NOTA EasyPanel:
# Si el Nginx esta en un container separado del app container,
# cambiar 127.0.0.1 por el nombre del servicio interno, ej:
#   proxy_pass http://wellcore-app:8080;
# =============================================================================
